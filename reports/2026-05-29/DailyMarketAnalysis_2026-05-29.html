  },

const TODAY = '2026-05-29';

const IMPACT_Y = { High: 3, Medium: 2, Low: 1 };
const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };

function parseDate(d) {
  const [y, m, day] = d.split('-').map(Number);
  return new Date(y, m - 1, day);
}

function daysBetween(a, b) {
  return Math.round((parseDate(b) - parseDate(a)) / 86400000);
}

function formatDate(d) {
  const dt = parseDate(d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

const CHART_START = '2026-05-26';
const CHART_END = '2026-06-03';
const TOTAL_DAYS = daysBetween(CHART_START, CHART_END);

function DailyMarketAnalysis() {
  const [selected, setSelected] = useState(null);
  const [filter, setFilter] = useState('All');

  const filteredEvents = useMemo(
    () => (filter === 'All' ? EVENTS : EVENTS.filter((e) => e.industry === filter)),
    [filter]
  );

  const chartW = 800;
  const chartH = 300;
  const pad = { top: 40, right: 30, bottom: 50, left: 60 };
  const innerW = chartW - pad.left - pad.right;
  const innerH = chartH - pad.top - pad.bottom;

  const todayX = pad.left + (daysBetween(CHART_START, TODAY) / TOTAL_DAYS) * innerW;

  const dates = [];
  for (let i = 0; i <= TOTAL_DAYS; i++) {
    const dt = new Date(2026, 4, 26 + i);
    const iso = dt.toISOString().split('T')[0];
    dates.push(iso);
  }

  return (
    <div style={{ background: '#0b0f1a', minHeight: '100vh', color: '#e2e8f0', fontFamily: 'Inter, system-ui, sans-serif', padding: '24px' }}>
      <h1 style={{ fontSize: '28px', fontWeight: 700, marginBottom: '4px' }}>Daily Market Analysis</h1>
      <p style={{ color: '#94a3b8', marginBottom: '24px' }}>May 29, 2026 — 14 events across 4 industries</p>

      <div style={{ display: 'flex', gap: '8px', marginBottom: '20px', flexWrap: 'wrap' }}>
        {['All', 'Tech', 'Healthcare', 'Energy', 'Finance'].map((ind) => (
          <button
            key={ind}
            onClick={() => { setFilter(ind); setSelected(null); }}
            style={{
              padding: '6px 16px',
              borderRadius: '9999px',
              border: 'none',
              cursor: 'pointer',
              fontSize: '13px',
              fontWeight: 600,
              background: filter === ind ? (ind === 'All' ? '#334155' : INDUSTRY_COLORS[ind]) : '#1e293b',
              color: filter === ind ? '#fff' : '#94a3b8',
            }}
          >
            {ind}
          </button>
        ))}
      </div>

      <div style={{ background: '#151c2c', borderRadius: '16px', padding: '24px', marginBottom: '24px', overflowX: 'auto' }}>
        <svg width={chartW} height={chartH} style={{ display: 'block', margin: '0 auto' }}>
          <rect x={pad.left} y={pad.top} width={todayX - pad.left} height={innerH} fill="rgba(239,68,68,0.05)" />
          <rect x={todayX} y={pad.top} width={pad.left + innerW - todayX} height={innerH} fill="rgba(34,197,94,0.05)" />

          {[1, 2, 3].map((v) => {
            const y = pad.top + innerH - ((v - 0.5) / 3) * innerH;
            return (
              <g key={v}>
                <line x1={pad.left} x2={pad.left + innerW} y1={y} y2={y} stroke="#1e293b" />
                <text x={pad.left - 10} y={y + 4} textAnchor="end" fill="#64748b" fontSize="12">
                  {v === 3 ? 'High' : v === 2 ? 'Med' : 'Low'}
                </text>
              </g>
            );
          })}

          {dates.map((d) => {
            const x = pad.left + (daysBetween(CHART_START, d) / TOTAL_DAYS) * innerW;
            return (
              <text key={d} x={x} y={chartH - 10} textAnchor="middle" fill="#64748b" fontSize="11">
                {formatDate(d)}
              </text>
            );
          })}

          <line x1={todayX} x2={todayX} y1={pad.top} y2={pad.top + innerH} stroke="#ef4444" strokeDasharray="6,4" strokeWidth={2} />
          <text x={todayX} y={pad.top - 10} textAnchor="middle" fill="#ef4444" fontSize="12" fontWeight="bold">TODAY</text>

          {filteredEvents.map((evt) => {
            const cx = pad.left + (daysBetween(CHART_START, evt.date) / TOTAL_DAYS) * innerW;
            const cy = pad.top + innerH - ((IMPACT_Y[evt.impact] - 0.5) / 3) * innerH;
            const isSelected = selected?.id === evt.id;
            return (
              <g key={evt.id} onClick={() => setSelected(isSelected ? null : evt)} style={{ cursor: 'pointer' }}>
                <circle cx={cx} cy={cy} r={isSelected ? 10 : 7} fill={INDUSTRY_COLORS[evt.industry]} opacity={isSelected ? 1 : 0.85} stroke={isSelected ? '#fff' : 'none'} strokeWidth={2} />
                {isSelected && (
                  <text x={cx} y={cy - 16} textAnchor="middle" fill="#fff" fontSize="11" fontWeight="600">
                    {evt.ticker}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>

      {selected && (
        <div style={{ background: '#151c2c', borderRadius: '16px', padding: '20px', marginBottom: '24px', borderLeft: `4px solid ${INDUSTRY_COLORS[selected.industry]}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', flexWrap: 'wrap', gap: '12px' }}>
            <div>
              <h3 style={{ fontSize: '18px', fontWeight: 700, marginBottom: '4px' }}>{selected.headline}</h3>
              <p style={{ color: '#94a3b8', fontSize: '14px' }}>
                {selected.ticker} · {formatDate(selected.date)} · {selected.impact} Impact · {selected.industry}
              </p>
            </div>
            <span style={{
              padding: '6px 16px',
              borderRadius: '9999px',
              fontSize: '13px',
              fontWeight: 700,
              background: REC_COLORS[selected.recommendation],
              color: selected.recommendation === 'HOLD' ? '#000' : '#fff',
            }}>
              {selected.recommendation}
            </span>
          </div>
          <p style={{ marginTop: '12px', color: '#cbd5e1', lineHeight: '1.6' }}>{selected.reason}</p>
        </div>
      )}

      <div style={{ background: '#151c2c', borderRadius: '16px', padding: '24px', overflowX: 'auto' }}>
        <h2 style={{ fontSize: '18px', fontWeight: 700, marginBottom: '16px' }}>All Events</h2>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '14px' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid #1e293b' }}>
              {['Date', 'Ticker', 'Headline', 'Industry', 'Impact', 'Rec'].map((h) => (
                <th key={h} style={{ padding: '10px 12px', textAlign: 'left', color: '#64748b', fontWeight: 600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filteredEvents.map((evt) => (
              <tr
                key={evt.id}
                onClick={() => setSelected(evt)}
                style={{ borderBottom: '1px solid #1e293b', cursor: 'pointer', background: selected?.id === evt.id ? '#1e293b' : 'transparent' }}
              >
                <td style={{ padding: '10px 12px', whiteSpace: 'nowrap' }}>{formatDate(evt.date)}</td>
                <td style={{ padding: '10px 12px', fontWeight: 700, color: INDUSTRY_COLORS[evt.industry] }}>{evt.ticker}</td>
                <td style={{ padding: '10px 12px' }}>{evt.headline}</td>
                <td style={{ padding: '10px 12px' }}>
                  <span style={{ padding: '2px 10px', borderRadius: '9999px', fontSize: '12px', background: INDUSTRY_COLORS[evt.industry] + '22', color: INDUSTRY_COLORS[evt.industry] }}>
                    {evt.industry}
                  </span>
                </td>
                <td style={{ padding: '10px 12px' }}>{evt.impact}</td>
                <td style={{ padding: '10px 12px' }}>
                  <span style={{
                    padding: '2px 10px',
                    borderRadius: '9999px',
                    fontSize: '12px',
                    fontWeight: 700,
                    background: REC_COLORS[evt.recommendation],
                    color: evt.recommendation === 'HOLD' ? '#000' : '#fff',
                  }}>
                    {evt.recommendation}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <p style={{ textAlign: 'center', color: '#475569', fontSize: '12px', marginTop: '24px' }}>
        Generated on May 29, 2026. For informational purposes only — not financial advice.
      </p>
    </div>
  );
}




ReactDOM.createRoot(document.getElementById("root")).render(<DailyMarketAnalysis />);
</script>

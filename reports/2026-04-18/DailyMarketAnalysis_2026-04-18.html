<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Market Analysis — 2026-04-18</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1a; }
    table tr:hover td { background: rgba(255,255,255,0.03) !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const EVENTS = [
      { id: 1, headline: "Goldman Sachs Q1 Earnings Beat", industry: "Finance", date: "2026-04-13", impact: "High", ticker: "GS", recommendation: "BUY", reason: "Strong trading and investment banking revenue rebound." },
      { id: 2, headline: "JPMorgan Chase Q1 Earnings Report", industry: "Finance", date: "2026-04-14", impact: "High", ticker: "JPM", recommendation: "BUY", reason: "Dominant capital markets position drives continued outperformance." },
      { id: 3, headline: "BlackRock Q1 Record AUM Growth", industry: "Finance", date: "2026-04-14", impact: "Medium", ticker: "BLK", recommendation: "BUY", reason: "Record assets under management driven by massive ETF inflows." },
      { id: 4, headline: "Johnson & Johnson Q1 Earnings", industry: "Healthcare", date: "2026-04-14", impact: "High", ticker: "JNJ", recommendation: "HOLD", reason: "Stable pharma demand but talc litigation overhang persists." },
      { id: 5, headline: "Bank of America Q1 Earnings", industry: "Finance", date: "2026-04-15", impact: "Medium", ticker: "BAC", recommendation: "HOLD", reason: "Net interest income under pressure from rate environment." },
      { id: 6, headline: "S&P 500 Breaks Above 7,100", industry: "Tech", date: "2026-04-17", impact: "High", ticker: "SPY", recommendation: "WATCH", reason: "Record highs driven by tech rally but extended move invites caution." },
      { id: 7, headline: "Netflix Q1 Earnings Disappoint", industry: "Tech", date: "2026-04-16", impact: "High", ticker: "NFLX", recommendation: "HOLD", reason: "Shares fell 9% on weak guidance but subscriber base still growing." },
      { id: 8, headline: "Abbott Labs Q1 Earnings Report", industry: "Healthcare", date: "2026-04-16", impact: "Medium", ticker: "ABT", recommendation: "WATCH", reason: "Medical device segment revenue growth is key focus for investors." },
      { id: 9, headline: "Broadcom-Meta 1GW AI Chip Deal", industry: "Tech", date: "2026-04-17", impact: "High", ticker: "AVGO", recommendation: "BUY", reason: "Landmark AI infrastructure deal signals sustained custom chip demand." },
      { id: 10, headline: "Meta AI Infrastructure Expansion", industry: "Tech", date: "2026-04-17", impact: "Medium", ticker: "META", recommendation: "BUY", reason: "1GW custom AI chip deployment shows aggressive AI investment commitment." },
      { id: 11, headline: "Iran Opens Strait of Hormuz", industry: "Energy", date: "2026-04-17", impact: "High", ticker: "XOM", recommendation: "SELL", reason: "Crude oil crashed 9.8% as geopolitical risk premium evaporates." },
      { id: 12, headline: "Crude Oil Drops Below $86/Barrel", industry: "Energy", date: "2026-04-17", impact: "High", ticker: "CVX", recommendation: "HOLD", reason: "Lower oil prices mixed for integrated majors with refining offset." },
      { id: 13, headline: "Israel-Lebanon Ceasefire Impact", industry: "Energy", date: "2026-04-17", impact: "Medium", ticker: "OXY", recommendation: "WATCH", reason: "Geopolitical de-escalation may continue to pressure energy prices." },
      { id: 14, headline: "Intuitive Surgical Q1 Earnings Expected", industry: "Healthcare", date: "2026-04-22", impact: "Medium", ticker: "ISRG", recommendation: "BUY", reason: "Robotic surgery leader expected to show strong procedure volume growth." },
    ];

    const INDUSTRY_COLORS = { Tech: '#818cf8', Healthcare: '#34d399', Energy: '#fbbf24', Finance: '#fb7185' };
    const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };
    const IMPACT_MAP = { High: 3, Medium: 2, Low: 1 };

    const CW = 900, CH = 380;
    const PAD = { l: 70, r: 30, t: 40, b: 55 };
    const PW = CW - PAD.l - PAD.r;
    const PH = CH - PAD.t - PAD.b;
    const TOTAL_DAYS = 10;
    const TODAY_IDX = 5;
    const START = new Date('2026-04-13T00:00:00');

    function dayX(dateStr) {
      var idx = Math.round((new Date(dateStr + 'T00:00:00') - START) / 86400000);
      return PAD.l + (idx / TOTAL_DAYS) * PW;
    }

    function impY(impact) {
      return PAD.t + PH * (1 - (IMPACT_MAP[impact] - 0.5) / 3.0);
    }

    var TX = PAD.l + (TODAY_IDX / TOTAL_DAYS) * PW;

    function App() {
      const [selected, setSelected] = useState(null);

      const dots = useMemo(function() {
        var counts = {};
        EVENTS.forEach(function(e) { var k = e.date + e.impact; counts[k] = (counts[k] || 0) + 1; });
        var indices = {};
        return EVENTS.map(function(e) {
          var k = e.date + e.impact;
          var i = indices[k] || 0;
          indices[k] = i + 1;
          var total = counts[k];
          var off = (i - (total - 1) / 2) * 22;
          return Object.assign({}, e, { cx: dayX(e.date) + off, cy: impY(e.impact) });
        });
      }, []);

      const dateLabels = useMemo(function() {
        return Array.from({ length: TOTAL_DAYS + 1 }, function(_, i) {
          var d = new Date(START);
          d.setDate(d.getDate() + i);
          return { label: (d.getMonth() + 1) + '/' + d.getDate(), x: PAD.l + (i / TOTAL_DAYS) * PW };
        });
      }, []);

      var sel = selected !== null ? dots.find(function(d) { return d.id === selected; }) : null;

      return (
        <div style={{ background: '#0b0f1a', color: '#e2e8f0', minHeight: '100vh', fontFamily: "'Inter', system-ui, -apple-system, sans-serif", padding: 24 }}>
          <div style={{ maxWidth: 960, margin: '0 auto' }}>
            <h1 style={{ fontSize: 28, fontWeight: 700, margin: 0 }}>Daily Market Analysis</h1>
            <p style={{ color: '#64748b', margin: '4px 0 24px', fontSize: 14 }}>April 18, 2026 — Market events, earnings &amp; macro tracker</p>

            <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 24 }}>
              <svg viewBox={"0 0 " + CW + " " + CH} style={{ width: '100%', height: 'auto' }}>
                <rect x={PAD.l} y={PAD.t} width={TX - PAD.l} height={PH} fill="rgba(239,68,68,0.05)" />
                <rect x={TX} y={PAD.t} width={PAD.l + PW - TX} height={PH} fill="rgba(34,197,94,0.05)" />

                {['High', 'Medium', 'Low'].map(function(level) {
                  var y = impY(level);
                  return (
                    <g key={level}>
                      <line x1={PAD.l} y1={y} x2={PAD.l + PW} y2={y} stroke="#1e293b" strokeWidth={1} />
                      <text x={PAD.l - 12} y={y + 4} textAnchor="end" fill="#64748b" fontSize={12}>{level}</text>
                    </g>
                  );
                })}

                {dateLabels.map(function(d, i) {
                  return (
                    <g key={i}>
                      <line x1={d.x} y1={PAD.t} x2={d.x} y2={PAD.t + PH} stroke="#1e293b" strokeWidth={0.5} />
                      <text x={d.x} y={PAD.t + PH + 18} textAnchor="middle" fill="#64748b" fontSize={11}>{d.label}</text>
                    </g>
                  );
                })}

                <line x1={TX} y1={PAD.t - 10} x2={TX} y2={PAD.t + PH + 5} stroke="#ef4444" strokeWidth={2} strokeDasharray="6,4" />
                <text x={TX} y={PAD.t - 16} textAnchor="middle" fill="#ef4444" fontSize={12} fontWeight={700}>TODAY</text>

                <text x={(PAD.l + TX) / 2} y={PAD.t + PH + 38} textAnchor="middle" fill="rgba(239,68,68,0.35)" fontSize={11} fontWeight={600}>PAST</text>
                <text x={(TX + PAD.l + PW) / 2} y={PAD.t + PH + 38} textAnchor="middle" fill="rgba(34,197,94,0.35)" fontSize={11} fontWeight={600}>UPCOMING</text>

                {dots.map(function(dot) {
                  return (
                    <circle
                      key={dot.id}
                      cx={dot.cx}
                      cy={dot.cy}
                      r={selected === dot.id ? 10 : 7}
                      fill={INDUSTRY_COLORS[dot.industry]}
                      stroke={selected === dot.id ? '#fff' : 'rgba(0,0,0,0.3)'}
                      strokeWidth={selected === dot.id ? 2.5 : 1.5}
                      style={{ cursor: 'pointer', transition: 'all 0.2s' }}
                      onClick={function() { setSelected(selected === dot.id ? null : dot.id); }}
                    />
                  );
                })}

                {Object.entries(INDUSTRY_COLORS).map(function(entry, i) {
                  var name = entry[0], color = entry[1];
                  return (
                    <g key={name} transform={"translate(" + (PAD.l + i * 140) + ", " + (CH - 6) + ")"}>
                      <circle cx={0} cy={-4} r={5} fill={color} />
                      <text x={10} y={0} fill="#94a3b8" fontSize={11}>{name}</text>
                    </g>
                  );
                })}
              </svg>
            </div>

            {sel && (
              <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 24, borderLeft: '4px solid ' + INDUSTRY_COLORS[sel.industry] }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                  <div>
                    <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8, flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 22, fontWeight: 700 }}>{sel.ticker}</span>
                      <span style={{ background: REC_COLORS[sel.recommendation], color: sel.recommendation === 'HOLD' ? '#000' : '#fff', padding: '2px 12px', borderRadius: 999, fontSize: 12, fontWeight: 600 }}>{sel.recommendation}</span>
                      <span style={{ background: '#1e293b', padding: '2px 10px', borderRadius: 999, fontSize: 12, color: '#94a3b8' }}>{sel.impact} Impact</span>
                    </div>
                    <h3 style={{ margin: '0 0 8px', fontSize: 16, fontWeight: 600 }}>{sel.headline}</h3>
                    <p style={{ margin: 0, color: '#94a3b8', fontSize: 14 }}>{sel.reason}</p>
                    <p style={{ margin: '8px 0 0', color: '#475569', fontSize: 12 }}>{sel.date} &middot; {sel.industry}</p>
                  </div>
                  <button onClick={function() { setSelected(null); }} style={{ background: 'none', border: 'none', color: '#64748b', cursor: 'pointer', fontSize: 22, padding: '0 4px' }}>{'\u2715'}</button>
                </div>
              </div>
            )}

            <div style={{ background: '#151c2c', borderRadius: 12, overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                <thead>
                  <tr style={{ borderBottom: '2px solid #1e293b' }}>
                    {['Date', 'Ticker', 'Headline', 'Industry', 'Impact', 'Rec'].map(function(h) {
                      return <th key={h} style={{ padding: '12px 16px', textAlign: 'left', color: '#64748b', fontWeight: 600, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {EVENTS.map(function(ev) {
                    return (
                      <tr key={ev.id} onClick={function() { setSelected(ev.id); }} style={{ borderBottom: '1px solid #1e293b', cursor: 'pointer' }}>
                        <td style={{ padding: '10px 16px', color: '#94a3b8' }}>{ev.date.slice(5)}</td>
                        <td style={{ padding: '10px 16px', fontWeight: 600 }}>{ev.ticker}</td>
                        <td style={{ padding: '10px 16px' }}>{ev.headline}</td>
                        <td style={{ padding: '10px 16px' }}>
                          <span style={{ color: INDUSTRY_COLORS[ev.industry] }}>{'\u25CF'} </span>{ev.industry}
                        </td>
                        <td style={{ padding: '10px 16px', color: ev.impact === 'High' ? '#f87171' : '#94a3b8' }}>{ev.impact}</td>
                        <td style={{ padding: '10px 16px' }}>
                          <span style={{ background: REC_COLORS[ev.recommendation], color: ev.recommendation === 'HOLD' ? '#000' : '#fff', padding: '2px 8px', borderRadius: 999, fontSize: 11, fontWeight: 600 }}>{ev.recommendation}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>

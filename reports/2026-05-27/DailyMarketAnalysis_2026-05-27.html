<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Analysis — 2026-05-27</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1a; color: #e2e8f0; font-family: Inter, system-ui, -apple-system, sans-serif; padding: 24px; }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filters button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: #1e293b; color: #94a3b8; transition: all 0.15s; }
    .filters button.active { color: #fff; }
    .card { background: #151c2c; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .chart-wrap { overflow-x: auto; }
    .legend { display: flex; justify-content: center; gap: 16px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    .detail-panel { border-left: 4px solid; }
    .detail-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
    .detail-title { font-size: 18px; font-weight: 700; }
    .detail-meta { color: #94a3b8; font-size: 13px; margin: 8px 0; }
    .detail-reason { font-size: 14px; line-height: 1.5; }
    .rec-badge { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { padding: 12px 14px; text-align: left; color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #1e293b; }
    td { padding: 10px 14px; border-bottom: 1px solid #1e293b; }
    tr.clickable { cursor: pointer; transition: background 0.1s; }
    tr.clickable:hover { background: #1e293b; }
    tr.selected { background: #1e293b; }
    .ticker-cell { font-weight: 700; }
    .headline-cell { color: #cbd5e1; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .meta-cell { color: #94a3b8; }
    .impact-high { color: #f87171; font-weight: 600; }
    .impact-medium { color: #fbbf24; font-weight: 600; }
    .impact-low { color: #94a3b8; font-weight: 600; }
    .rec-pill { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; color: #fff; }
    .footer { color: #475569; font-size: 11px; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const EVENTS = [
      { id: 1, ticker: 'MU', headline: 'Micron surges 19%, crosses $1T market cap on AI memory demand', industry: 'Tech', date: '2026-05-26', impact: 'High', recommendation: 'BUY', reason: 'AI memory demand driving exceptional growth with analyst upgrades across the Street' },
      { id: 2, ticker: 'MRVL', headline: 'Marvell Technology Q1 earnings report due', industry: 'Tech', date: '2026-05-27', impact: 'High', recommendation: 'WATCH', reason: 'Data center chip demand expected to beat estimates amid AI infrastructure buildout' },
      { id: 3, ticker: 'CRM', headline: 'Salesforce Q1 earnings report due', industry: 'Tech', date: '2026-05-27', impact: 'High', recommendation: 'WATCH', reason: 'AI-driven enterprise spending and Agentforce adoption are key metrics to monitor' },
      { id: 4, ticker: 'DELL', headline: 'Dell Technologies Q1 earnings report due', industry: 'Tech', date: '2026-05-28', impact: 'Medium', recommendation: 'WATCH', reason: 'AI server order backlog may deliver upside surprise on infrastructure demand' },
      { id: 5, ticker: 'ZS', headline: 'Zscaler Q3 earnings report — cybersecurity spending steady', industry: 'Tech', date: '2026-05-26', impact: 'Medium', recommendation: 'HOLD', reason: 'Cybersecurity growth is steady but largely priced into current valuation' },
      { id: 6, ticker: 'BP', headline: 'BP chairman ousted amid governance crisis, shares fall sharply', industry: 'Energy', date: '2026-05-26', impact: 'High', recommendation: 'SELL', reason: 'Leadership turmoil and governance concerns signal deeper structural issues at the company' },
      { id: 7, ticker: 'XLE', headline: 'US-Iran peace deal prospects lift energy sector outlook', industry: 'Energy', date: '2026-05-27', impact: 'High', recommendation: 'WATCH', reason: 'Geopolitical resolution could significantly reshape oil supply and price dynamics' },
      { id: 8, ticker: 'CRK', headline: 'Comstock Resources Q1 results filing with SEC', industry: 'Energy', date: '2026-05-27', impact: 'Low', recommendation: 'HOLD', reason: 'Natural gas pure-play remains stable but lacks near-term catalyst' },
      { id: 9, ticker: 'COST', headline: 'Costco Q3 earnings — consumer staples resilience in focus', industry: 'Finance', date: '2026-05-28', impact: 'High', recommendation: 'BUY', reason: 'Consumer staples resilience and membership growth provide defensive upside amid confidence dip' },
      { id: 10, ticker: 'AZO', headline: 'AutoZone Q3 revenue miss sends shares plunging 10%', industry: 'Finance', date: '2026-05-26', impact: 'High', recommendation: 'SELL', reason: 'Revenue miss of $4.84B vs $4.86B expected signals weakening consumer discretionary demand' },
      { id: 11, ticker: 'BKE', headline: 'Buckle Inc Q1 earnings report due', industry: 'Finance', date: '2026-05-29', impact: 'Low', recommendation: 'HOLD', reason: 'Niche retailer with limited market-moving potential but steady dividend' },
      { id: 12, ticker: 'SPY', headline: 'Consumer Confidence Index drops to 93.1 from 93.8 in May', industry: 'Finance', date: '2026-05-27', impact: 'Medium', recommendation: 'WATCH', reason: 'Declining consumer confidence may pressure retail and discretionary stocks near-term' },
      { id: 13, ticker: 'RDY', headline: 'Dr. Reddys Laboratories Q4 earnings filing', industry: 'Healthcare', date: '2026-05-27', impact: 'Medium', recommendation: 'HOLD', reason: 'Steady generic drug pipeline delivers consistent results with limited growth upside' },
      { id: 14, ticker: 'XBI', headline: 'Biotech sector rallies as Nasdaq hits fresh all-time high', industry: 'Healthcare', date: '2026-05-26', impact: 'Medium', recommendation: 'BUY', reason: 'Nasdaq record close at 26,656 lifts biotech sentiment and fund inflows' },
    ];

    const INDUSTRY_COLORS = { Tech: '#818cf8', Healthcare: '#34d399', Energy: '#fbbf24', Finance: '#fb7185' };
    const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };
    const IMPACT_MAP = { High: 3, Medium: 2, Low: 1 };
    const TODAY = '2026-05-27';

    function parseDate(d) {
      const [y, m, day] = d.split('-').map(Number);
      return new Date(y, m - 1, day);
    }

    const DATE_RANGE = [];
    for (let i = -3; i <= 5; i++) {
      const d = new Date(2026, 4, 27 + i);
      DATE_RANGE.push(d);
    }

    function App() {
      const [selected, setSelected] = useState(null);
      const [filterIndustry, setFilterIndustry] = useState('All');

      const filtered = useMemo(() => {
        if (filterIndustry === 'All') return EVENTS;
        return EVENTS.filter(e => e.industry === filterIndustry);
      }, [filterIndustry]);

      const chartW = 800;
      const chartH = 300;
      const padL = 50;
      const padR = 30;
      const padT = 30;
      const padB = 50;
      const plotW = chartW - padL - padR;
      const plotH = chartH - padT - padB;

      const minDate = DATE_RANGE[0].getTime();
      const maxDate = DATE_RANGE[DATE_RANGE.length - 1].getTime();

      function xPos(dateStr) {
        const t = parseDate(dateStr).getTime();
        return padL + ((t - minDate) / (maxDate - minDate)) * plotW;
      }

      function yPos(impact) {
        const level = IMPACT_MAP[impact];
        return padT + plotH - ((level - 0.5) / 3) * plotH;
      }

      const todayX = xPos(TODAY);

      const jitter = (id, axis) => {
        const seed = id * 7 + (axis === 'x' ? 3 : 17);
        return ((seed % 20) - 10);
      };

      return (
        React.createElement('div', { className: 'container' },
          React.createElement('h1', null, 'Daily Market Analysis'),
          React.createElement('p', { className: 'subtitle' }, 'May 27, 2026 — S&P 500: 7,519.12 (+0.61%) | Nasdaq: 26,656.18 (+1.19%) | Dow: 50,461.68 (−0.23%)'),

          React.createElement('div', { className: 'filters' },
            ['All', 'Tech', 'Healthcare', 'Energy', 'Finance'].map(ind =>
              React.createElement('button', {
                key: ind,
                className: filterIndustry === ind ? 'active' : '',
                style: { background: filterIndustry === ind ? (ind === 'All' ? '#334155' : INDUSTRY_COLORS[ind]) : '#1e293b' },
                onClick: () => setFilterIndustry(ind),
              }, ind)
            )
          ),

          React.createElement('div', { className: 'card chart-wrap' },
            React.createElement('svg', { width: chartW, height: chartH, style: { display: 'block', margin: '0 auto' } },
              React.createElement('rect', { x: padL, y: padT, width: todayX - padL, height: plotH, fill: 'rgba(239,68,68,0.06)' }),
              React.createElement('rect', { x: todayX, y: padT, width: padL + plotW - todayX, height: plotH, fill: 'rgba(34,197,94,0.06)' }),
              React.createElement('line', { x1: todayX, y1: padT, x2: todayX, y2: padT + plotH, stroke: '#ef4444', strokeWidth: 1.5, strokeDasharray: '6,4' }),
              React.createElement('text', { x: todayX, y: padT - 8, fill: '#ef4444', fontSize: 11, textAnchor: 'middle', fontWeight: 600 }, 'TODAY'),

              [1, 2, 3].map(level => {
                const y = padT + plotH - ((level - 0.5) / 3) * plotH;
                return React.createElement('g', { key: level },
                  React.createElement('line', { x1: padL, y1: y, x2: padL + plotW, y2: y, stroke: '#1e293b', strokeWidth: 1 }),
                  React.createElement('text', { x: padL - 8, y: y + 4, fill: '#64748b', fontSize: 11, textAnchor: 'end' },
                    level === 3 ? 'High' : level === 2 ? 'Med' : 'Low')
                );
              }),

              DATE_RANGE.map((d, i) => {
                const x = padL + (i / (DATE_RANGE.length - 1)) * plotW;
                const label = (d.getMonth() + 1) + '/' + d.getDate();
                return React.createElement('text', { key: i, x: x, y: padT + plotH + 20, fill: '#64748b', fontSize: 11, textAnchor: 'middle' }, label);
              }),

              filtered.map(ev => {
                const cx = xPos(ev.date) + jitter(ev.id, 'x');
                const cy = yPos(ev.impact) + jitter(ev.id, 'y');
                const isSelected = selected && selected.id === ev.id;
                return React.createElement('g', { key: ev.id, onClick: () => setSelected(isSelected ? null : ev), style: { cursor: 'pointer' } },
                  React.createElement('circle', { cx: cx, cy: cy, r: isSelected ? 10 : 7, fill: INDUSTRY_COLORS[ev.industry], opacity: isSelected ? 1 : 0.85, stroke: isSelected ? '#fff' : 'none', strokeWidth: 2 }),
                  React.createElement('text', { x: cx, y: cy - 12, fill: '#e2e8f0', fontSize: 10, textAnchor: 'middle', fontWeight: 600 }, ev.ticker)
                );
              })
            ),

            React.createElement('div', { className: 'legend' },
              Object.entries(INDUSTRY_COLORS).map(([name, color]) =>
                React.createElement('div', { key: name, className: 'legend-item' },
                  React.createElement('div', { className: 'legend-dot', style: { background: color } }),
                  name
                )
              )
            )
          ),

          selected && React.createElement('div', { className: 'card detail-panel', style: { borderLeftColor: INDUSTRY_COLORS[selected.industry] } },
            React.createElement('div', { className: 'detail-top' },
              React.createElement('div', null,
                React.createElement('div', { className: 'detail-title' }, selected.ticker + ' — ' + selected.headline),
                React.createElement('p', { className: 'detail-meta' }, selected.industry + ' · ' + selected.date + ' · Impact: ' + selected.impact),
                React.createElement('p', { className: 'detail-reason' }, selected.reason)
              ),
              React.createElement('span', { className: 'rec-badge', style: { background: REC_COLORS[selected.recommendation] } }, selected.recommendation)
            )
          ),

          React.createElement('div', { className: 'card', style: { padding: 0, overflow: 'hidden' } },
            React.createElement('table', null,
              React.createElement('thead', null,
                React.createElement('tr', null,
                  ['Ticker', 'Headline', 'Industry', 'Date', 'Impact', 'Rec'].map(h =>
                    React.createElement('th', { key: h }, h)
                  )
                )
              ),
              React.createElement('tbody', null,
                filtered.map(ev =>
                  React.createElement('tr', {
                    key: ev.id,
                    className: 'clickable' + (selected && selected.id === ev.id ? ' selected' : ''),
                    onClick: () => setSelected(selected && selected.id === ev.id ? null : ev),
                  },
                    React.createElement('td', { className: 'ticker-cell', style: { color: INDUSTRY_COLORS[ev.industry] } }, ev.ticker),
                    React.createElement('td', { className: 'headline-cell' }, ev.headline),
                    React.createElement('td', { className: 'meta-cell' }, ev.industry),
                    React.createElement('td', { className: 'meta-cell' }, ev.date),
                    React.createElement('td', null,
                      React.createElement('span', { className: ev.impact === 'High' ? 'impact-high' : ev.impact === 'Medium' ? 'impact-medium' : 'impact-low' }, ev.impact)
                    ),
                    React.createElement('td', null,
                      React.createElement('span', { className: 'rec-pill', style: { background: REC_COLORS[ev.recommendation] } }, ev.recommendation)
                    )
                  )
                )
              )
            )
          ),

          React.createElement('p', { className: 'footer' }, 'Generated on 2026-05-27. For informational purposes only — not financial advice.')
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Analysis — 2026-05-11</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #app { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const INDUSTRY_COLORS = {
      Tech: '#818cf8',
      Healthcare: '#34d399',
      Energy: '#fbbf24',
      Finance: '#fb7185',
    };

    const EVENTS = [
      { id: 1, headline: 'Rackspace & AMD Announce AI Cloud Partnership for Regulated Industries', industry: 'Tech', date: '2026-05-08', impact: 'High', ticker: 'RXT', recommendation: 'BUY', reason: 'Enterprise AI cloud for sovereign workloads opens a high-margin, underserved market.' },
      { id: 2, headline: 'Applied Materials Q1 Earnings Report', industry: 'Tech', date: '2026-05-14', impact: 'High', ticker: 'AMAT', recommendation: 'WATCH', reason: 'Semiconductor equipment demand is a leading indicator for the chip cycle ahead.' },
      { id: 3, headline: 'Alibaba Group Q1 Earnings Report', industry: 'Tech', date: '2026-05-13', impact: 'Medium', ticker: 'BABA', recommendation: 'HOLD', reason: 'China regulatory overhang and macro uncertainty limit near-term upside.' },
      { id: 4, headline: 'Nasdaq Hits Record Highs on AI Momentum — Sixth Straight Winning Week', industry: 'Tech', date: '2026-05-09', impact: 'Medium', ticker: 'QQQ', recommendation: 'HOLD', reason: 'Extended rally is strong but overbought conditions warrant caution.' },
      { id: 5, headline: 'Takeda Pharmaceutical Q1 Earnings Report', industry: 'Healthcare', date: '2026-05-13', impact: 'Medium', ticker: 'TAK', recommendation: 'HOLD', reason: 'Pipeline progress is key; watch for GI and neuroscience drug updates.' },
      { id: 6, headline: 'Biotech Sector Awaits FDA Drug Approval Decisions', industry: 'Healthcare', date: '2026-05-14', impact: 'Medium', ticker: 'XBI', recommendation: 'WATCH', reason: 'Multiple PDUFA dates this week could drive volatility in small-cap biotech.' },
      { id: 7, headline: 'Healthcare Sector Rotation Amid Rate Uncertainty', industry: 'Healthcare', date: '2026-05-11', impact: 'Low', ticker: 'XLV', recommendation: 'HOLD', reason: 'Defensive positioning makes sense as Fed rate path remains unclear.' },
      { id: 8, headline: 'Oil Prices Surge 2%+ on Strait of Hormuz Shipping Tensions', industry: 'Energy', date: '2026-05-11', impact: 'High', ticker: 'XLE', recommendation: 'BUY', reason: 'Geopolitical risk premium is expanding and energy supply disruption risk is real.' },
      { id: 9, headline: 'Petrobras Q1 Earnings Report', industry: 'Energy', date: '2026-05-11', impact: 'Medium', ticker: 'PBR', recommendation: 'WATCH', reason: 'Dividend yield and production guidance are the key metrics to monitor.' },
      { id: 10, headline: 'Constellation Energy Q1 Earnings — Nuclear Renaissance Theme', industry: 'Energy', date: '2026-05-11', impact: 'High', ticker: 'CEG', recommendation: 'BUY', reason: 'Nuclear energy demand surging as AI data centers drive baseload power needs.' },
      { id: 11, headline: 'Israel-Iran Conflict Escalation — Netanyahu Warns "Not Over"', industry: 'Energy', date: '2026-05-11', impact: 'High', ticker: 'USO', recommendation: 'WATCH', reason: 'Potential disruption to global energy supply routes keeps oil volatility elevated.' },
      { id: 12, headline: 'CPI Inflation Report Release — April 2026 Data', industry: 'Finance', date: '2026-05-12', impact: 'High', ticker: 'SPY', recommendation: 'WATCH', reason: 'Inflation data is crucial for the Fed rate path; oil shock complicates the picture.' },
      { id: 13, headline: 'April Jobs Report Beat: 115K vs 65K Expected', industry: 'Finance', date: '2026-05-08', impact: 'High', ticker: 'DIA', recommendation: 'HOLD', reason: 'Strong labor market complicates the timeline for potential rate cuts.' },
      { id: 14, headline: 'Fed Rate Expectations Shift on Energy-Driven Inflation Fears', industry: 'Finance', date: '2026-05-11', impact: 'High', ticker: 'TLT', recommendation: 'SELL', reason: 'Rising energy costs may delay rate cuts, pushing bond yields higher.' },
      { id: 15, headline: 'S&P 500 Six-Week Win Streak — Longest Since 2024', industry: 'Finance', date: '2026-05-09', impact: 'Medium', ticker: 'SPY', recommendation: 'HOLD', reason: 'Momentum is strong but mean-reversion risk rises with extended streaks.' },
    ];

    const TODAY = '2026-05-11';
    const IMPACT_Y = { High: 3, Medium: 2, Low: 1 };
    const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };

    function toX(dateStr, chartLeft, chartWidth) {
      const start = new Date('2026-05-08');
      const end = new Date('2026-05-16');
      const cur = new Date(dateStr);
      return chartLeft + ((cur - start) / (end - start)) * chartWidth;
    }

    function toY(impact, chartTop, chartHeight) {
      const level = IMPACT_Y[impact] || 2;
      return chartTop + chartHeight - ((level - 0.5) / 3.5) * chartHeight;
    }

    function App() {
      const [selected, setSelected] = useState(null);
      const [filterIndustry, setFilterIndustry] = useState('All');

      const filtered = useMemo(function() {
        if (filterIndustry === 'All') return EVENTS;
        return EVENTS.filter(function(e) { return e.industry === filterIndustry; });
      }, [filterIndustry]);

      const svgW = 900, svgH = 340;
      const chartLeft = 70, chartTop = 30, chartWidth = 790, chartHeight = 260;
      const todayX = toX(TODAY, chartLeft, chartWidth);

      const dates = [];
      for (var d = new Date('2026-05-08'); d <= new Date('2026-05-16'); d.setDate(d.getDate() + 1)) {
        dates.push(new Date(d).toISOString().slice(0, 10));
      }

      return (
        React.createElement('div', { style: { background: '#0b0f1a', color: '#e2e8f0', minHeight: '100vh', fontFamily: "'Inter', system-ui, sans-serif", padding: '2rem' } },
          React.createElement('h1', { style: { fontSize: '1.8rem', fontWeight: 700, marginBottom: '0.25rem' } }, 'Daily Market Analysis'),
          React.createElement('p', { style: { color: '#94a3b8', marginBottom: '1.5rem' } }, 'May 11, 2026 — 15 Events across 4 Industries'),

          React.createElement('div', { style: { display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', flexWrap: 'wrap' } },
            ['All', 'Tech', 'Healthcare', 'Energy', 'Finance'].map(function(ind) {
              return React.createElement('button', {
                key: ind,
                onClick: function() { setFilterIndustry(ind); setSelected(null); },
                style: {
                  padding: '0.4rem 1rem', borderRadius: '9999px', border: 'none', cursor: 'pointer',
                  background: filterIndustry === ind ? (INDUSTRY_COLORS[ind] || '#6366f1') : '#1e293b',
                  color: filterIndustry === ind ? '#0b0f1a' : '#94a3b8', fontWeight: 600, fontSize: '0.85rem',
                }
              }, ind);
            })
          ),

          React.createElement('div', { style: { background: '#151c2c', borderRadius: '1rem', padding: '1.5rem', marginBottom: '1.5rem', overflowX: 'auto' } },
            React.createElement('svg', { viewBox: '0 0 ' + svgW + ' ' + svgH, style: { width: '100%', maxWidth: 900 } },
              React.createElement('rect', { x: chartLeft, y: chartTop, width: todayX - chartLeft, height: chartHeight, fill: 'rgba(239,68,68,0.06)' }),
              React.createElement('rect', { x: todayX, y: chartTop, width: chartLeft + chartWidth - todayX, height: chartHeight, fill: 'rgba(34,197,94,0.06)' }),

              [1, 2, 3].map(function(level) {
                var label = ['Low', 'Medium', 'High'][level - 1];
                var y = toY(label, chartTop, chartHeight);
                return React.createElement('g', { key: level },
                  React.createElement('line', { x1: chartLeft, y1: y, x2: chartLeft + chartWidth, y2: y, stroke: '#1e293b', strokeWidth: 1 }),
                  React.createElement('text', { x: chartLeft - 10, y: y + 4, textAnchor: 'end', fill: '#64748b', fontSize: 12 }, label)
                );
              }),

              dates.map(function(dt) {
                var x = toX(dt, chartLeft, chartWidth);
                return React.createElement('g', { key: dt },
                  React.createElement('line', { x1: x, y1: chartTop, x2: x, y2: chartTop + chartHeight, stroke: '#1e293b', strokeWidth: 1 }),
                  React.createElement('text', { x: x, y: chartTop + chartHeight + 20, textAnchor: 'middle', fill: '#64748b', fontSize: 11 }, dt.slice(5))
                );
              }),

              React.createElement('line', { x1: todayX, y1: chartTop - 10, x2: todayX, y2: chartTop + chartHeight + 5, stroke: '#ef4444', strokeWidth: 2, strokeDasharray: '6,4' }),
              React.createElement('text', { x: todayX, y: chartTop - 15, textAnchor: 'middle', fill: '#ef4444', fontSize: 11, fontWeight: 700 }, 'TODAY'),

              filtered.map(function(evt, i) {
                var cx = toX(evt.date, chartLeft, chartWidth);
                var cy = toY(evt.impact, chartTop, chartHeight);
                var jitter = (i % 5 - 2) * 8;
                var isSelected = selected && selected.id === evt.id;
                return React.createElement('g', { key: evt.id, onClick: function() { setSelected(evt); }, style: { cursor: 'pointer' } },
                  React.createElement('circle', { cx: cx + jitter, cy: cy, r: isSelected ? 10 : 7, fill: INDUSTRY_COLORS[evt.industry], opacity: isSelected ? 1 : 0.85, stroke: isSelected ? '#fff' : 'none', strokeWidth: 2 }),
                  React.createElement('text', { x: cx + jitter, y: cy - 12, textAnchor: 'middle', fill: INDUSTRY_COLORS[evt.industry], fontSize: 9, fontWeight: 600 }, evt.ticker)
                );
              })
            )
          ),

          selected && React.createElement('div', { style: { background: '#151c2c', borderRadius: '1rem', padding: '1.5rem', marginBottom: '1.5rem', borderLeft: '4px solid ' + INDUSTRY_COLORS[selected.industry] } },
            React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '1rem' } },
              React.createElement('div', null,
                React.createElement('h3', { style: { fontSize: '1.1rem', fontWeight: 700, marginBottom: '0.5rem' } }, selected.headline),
                React.createElement('p', { style: { color: '#94a3b8', fontSize: '0.9rem' } },
                  React.createElement('span', { style: { color: INDUSTRY_COLORS[selected.industry], fontWeight: 600 } }, selected.industry),
                  ' · ', selected.date, ' · ', selected.ticker, ' · Impact: ', selected.impact
                )
              ),
              React.createElement('span', {
                style: {
                  padding: '0.3rem 1rem', borderRadius: '9999px', fontWeight: 700, fontSize: '0.85rem',
                  background: REC_COLORS[selected.recommendation], color: '#0b0f1a',
                }
              }, selected.recommendation)
            ),
            React.createElement('p', { style: { marginTop: '0.75rem', color: '#cbd5e1', fontSize: '0.95rem' } }, selected.reason)
          ),

          React.createElement('div', { style: { background: '#151c2c', borderRadius: '1rem', padding: '1.5rem', overflowX: 'auto' } },
            React.createElement('h2', { style: { fontSize: '1.2rem', fontWeight: 700, marginBottom: '1rem' } }, 'All Events'),
            React.createElement('table', { style: { width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' } },
              React.createElement('thead', null,
                React.createElement('tr', { style: { borderBottom: '2px solid #1e293b', textAlign: 'left' } },
                  React.createElement('th', { style: { padding: '0.6rem 0.5rem', color: '#64748b' } }, 'Date'),
                  React.createElement('th', { style: { padding: '0.6rem 0.5rem', color: '#64748b' } }, 'Ticker'),
                  React.createElement('th', { style: { padding: '0.6rem 0.5rem', color: '#64748b' } }, 'Headline'),
                  React.createElement('th', { style: { padding: '0.6rem 0.5rem', color: '#64748b' } }, 'Industry'),
                  React.createElement('th', { style: { padding: '0.6rem 0.5rem', color: '#64748b' } }, 'Impact'),
                  React.createElement('th', { style: { padding: '0.6rem 0.5rem', color: '#64748b' } }, 'Rec')
                )
              ),
              React.createElement('tbody', null,
                EVENTS.map(function(evt) {
                  return React.createElement('tr', { key: evt.id, onClick: function() { setSelected(evt); }, style: { borderBottom: '1px solid #1e293b', cursor: 'pointer' } },
                    React.createElement('td', { style: { padding: '0.6rem 0.5rem' } }, evt.date.slice(5)),
                    React.createElement('td', { style: { padding: '0.6rem 0.5rem', fontWeight: 700, color: INDUSTRY_COLORS[evt.industry] } }, evt.ticker),
                    React.createElement('td', { style: { padding: '0.6rem 0.5rem' } }, evt.headline),
                    React.createElement('td', { style: { padding: '0.6rem 0.5rem', color: INDUSTRY_COLORS[evt.industry] } }, evt.industry),
                    React.createElement('td', { style: { padding: '0.6rem 0.5rem' } }, evt.impact),
                    React.createElement('td', { style: { padding: '0.6rem 0.5rem' } },
                      React.createElement('span', {
                        style: {
                          padding: '0.15rem 0.6rem', borderRadius: '9999px', fontSize: '0.75rem', fontWeight: 700,
                          background: REC_COLORS[evt.recommendation], color: '#0b0f1a',
                        }
                      }, evt.recommendation)
                    )
                  );
                })
              )
            )
          ),

          React.createElement('p', { style: { textAlign: 'center', color: '#475569', fontSize: '0.75rem', marginTop: '2rem' } },
            'Generated on 2026-05-11. For informational purposes only — not financial advice.'
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Analysis - 2026-06-05</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    #app { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const EVENTS = [
      { id: 1, headline: "Broadcom Earnings Miss Triggers Double-Digit Plunge", industry: "Tech", date: "2026-06-03", impact: "High", ticker: "AVGO", recommendation: "SELL", reason: "Double-digit drop on disappointing AI revenue guidance signals overvaluation risk" },
      { id: 2, headline: "CrowdStrike Falls 9% on Weak Q2 Guidance", industry: "Tech", date: "2026-06-04", impact: "High", ticker: "CRWD", recommendation: "SELL", reason: "Lackluster guidance suggests slowing enterprise cybersecurity spending" },
      { id: 3, headline: "NVIDIA Rides AI Chip Demand to Drive S&P Record", industry: "Tech", date: "2026-06-02", impact: "High", ticker: "NVDA", recommendation: "WATCH", reason: "AI momentum remains strong but sector rotation risk is elevated after Broadcom miss" },
      { id: 4, headline: "Semiconductor Sector Selloff Deepens on Chip Weakness", industry: "Tech", date: "2026-06-05", impact: "High", ticker: "SOXX", recommendation: "WATCH", reason: "Broadcom contagion spreading across chip names; wait for stabilization before entry" },
      { id: 5, headline: "UnitedHealth Surges 5%+ Leading Dow to All-Time High", industry: "Healthcare", date: "2026-06-04", impact: "High", ticker: "UNH", recommendation: "BUY", reason: "Strong defensive positioning and earnings momentum driving institutional rotation inflows" },
      { id: 6, headline: "Healthcare Sector Benefits from Tech Rotation", industry: "Healthcare", date: "2026-06-04", impact: "Medium", ticker: "XLV", recommendation: "BUY", reason: "Defensive rotation favoring healthcare as investors de-risk from AI-heavy portfolios" },
      { id: 7, headline: "Eli Lilly GLP-1 Drug Pipeline Maintains Momentum", industry: "Healthcare", date: "2026-06-06", impact: "Medium", ticker: "LLY", recommendation: "BUY", reason: "Continued weight-loss drug demand and expanded indications support long-term growth thesis" },
      { id: 8, headline: "Iran Geopolitical Tensions Raise Energy Volatility", industry: "Energy", date: "2026-06-04", impact: "High", ticker: "XLE", recommendation: "WATCH", reason: "War concerns create supply disruption risk but unclear escalation trajectory warrants caution" },
      { id: 9, headline: "Oil Prices Decline Despite Middle East Tensions", industry: "Energy", date: "2026-06-04", impact: "Medium", ticker: "USO", recommendation: "HOLD", reason: "Falling prices despite geopolitical risk suggest underlying demand weakness" },
      { id: 10, headline: "ExxonMobil Q3 Production Outlook and Capital Plans", industry: "Energy", date: "2026-06-07", impact: "Medium", ticker: "XOM", recommendation: "HOLD", reason: "Stable production outlook but margin compression from lower oil prices limits upside" },
      { id: 11, headline: "Dow Jones Hits All-Time High at 51,561", industry: "Finance", date: "2026-06-04", impact: "High", ticker: "DIA", recommendation: "BUY", reason: "Broad market strength with 874-point rally reflects robust institutional confidence" },
      { id: 12, headline: "May Nonfarm Payrolls Report Due Friday", industry: "Finance", date: "2026-06-05", impact: "High", ticker: "SPY", recommendation: "WATCH", reason: "Key employment data could shift Fed rate cut expectations and drive major repricing" },
      { id: 13, headline: "Treasury Yields Decline Supporting Equity Valuations", industry: "Finance", date: "2026-06-04", impact: "Medium", ticker: "TLT", recommendation: "BUY", reason: "Falling yields create favorable backdrop for duration-sensitive assets and growth stocks" },
      { id: 14, headline: "Fed Rate Decision Preview Dominates Forward Outlook", industry: "Finance", date: "2026-06-10", impact: "High", ticker: "SPY", recommendation: "WATCH", reason: "Markets pricing potential rate action; positioning ahead of decision carries elevated two-way risk" },
    ];

    const INDUSTRY_COLORS = { Tech: "#818cf8", Healthcare: "#34d399", Energy: "#fbbf24", Finance: "#fb7185" };
    const REC_COLORS = { BUY: "#22c55e", SELL: "#ef4444", HOLD: "#eab308", WATCH: "#3b82f6" };
    const IMPACT_Y = { High: 3, Medium: 2, Low: 1 };
    const TODAY = "2026-06-05";
    const DATES = ["2026-06-02","2026-06-03","2026-06-04","2026-06-05","2026-06-06","2026-06-07","2026-06-08","2026-06-09","2026-06-10"];

    function App() {
      const [selectedEvent, setSelectedEvent] = useState(null);

      const chartWidth = 800;
      const chartHeight = 300;
      const pad = { top: 40, right: 40, bottom: 50, left: 60 };
      const plotW = chartWidth - pad.left - pad.right;
      const plotH = chartHeight - pad.top - pad.bottom;
      const todayIndex = DATES.indexOf(TODAY);

      const points = useMemo(() => {
        return EVENTS.map((ev) => {
          const dateIdx = DATES.indexOf(ev.date);
          const x = pad.left + (dateIdx / (DATES.length - 1)) * plotW;
          const y = pad.top + plotH - ((IMPACT_Y[ev.impact] - 0.5) / 3) * plotH;
          return { ...ev, x, y };
        });
      }, []);

      const todayX = pad.left + (todayIndex / (DATES.length - 1)) * plotW;

      return (
        <div style={{ minHeight: "100vh", background: "#0b0f1a", color: "#e2e8f0", fontFamily: "'Inter', system-ui, sans-serif", padding: "2rem" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            <h1 style={{ fontSize: "1.75rem", fontWeight: 700, marginBottom: "0.25rem" }}>Daily Market Analysis</h1>
            <p style={{ color: "#94a3b8", marginBottom: "1.5rem" }}>{TODAY} &middot; 14 Events across 4 Industries</p>

            <div style={{ display: "flex", gap: "1rem", marginBottom: "1rem", flexWrap: "wrap" }}>
              {Object.entries(INDUSTRY_COLORS).map(([ind, col]) => (
                <span key={ind} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: "0.85rem" }}>
                  <span style={{ width: 10, height: 10, borderRadius: "50%", background: col, display: "inline-block" }} />
                  {ind}
                </span>
              ))}
            </div>

            <div style={{ background: "#151c2c", borderRadius: 12, padding: "1.5rem", marginBottom: "1.5rem" }}>
              <svg viewBox={"0 0 " + chartWidth + " " + chartHeight} style={{ width: "100%", height: "auto" }}>
                <rect x={pad.left} y={pad.top} width={todayX - pad.left} height={plotH} fill="rgba(239,68,68,0.06)" />
                <rect x={todayX} y={pad.top} width={pad.left + plotW - todayX} height={plotH} fill="rgba(34,197,94,0.06)" />

                <line x1={todayX} y1={pad.top} x2={todayX} y2={pad.top + plotH} stroke="#ef4444" strokeWidth={2} strokeDasharray="6,4" />
                <text x={todayX} y={pad.top - 8} textAnchor="middle" fill="#ef4444" fontSize={11} fontWeight={600}>TODAY</text>

                {[1, 2, 3].map((level) => {
                  const y = pad.top + plotH - ((level - 0.5) / 3) * plotH;
                  return (
                    <g key={level}>
                      <line x1={pad.left} y1={y} x2={pad.left + plotW} y2={y} stroke="#1e293b" strokeWidth={1} />
                      <text x={pad.left - 10} y={y + 4} textAnchor="end" fill="#64748b" fontSize={11}>
                        {level === 3 ? "High" : level === 2 ? "Medium" : "Low"}
                      </text>
                    </g>
                  );
                })}

                {DATES.map((d, i) => {
                  const x = pad.left + (i / (DATES.length - 1)) * plotW;
                  return (
                    <g key={d}>
                      <line x1={x} y1={pad.top} x2={x} y2={pad.top + plotH} stroke="#1e293b" strokeWidth={1} />
                      <text x={x} y={pad.top + plotH + 20} textAnchor="middle" fill="#64748b" fontSize={10}>
                        {d.slice(5)}
                      </text>
                    </g>
                  );
                })}

                {points.map((pt) => (
                  <circle
                    key={pt.id}
                    cx={pt.x}
                    cy={pt.y}
                    r={selectedEvent && selectedEvent.id === pt.id ? 9 : 7}
                    fill={INDUSTRY_COLORS[pt.industry]}
                    stroke={selectedEvent && selectedEvent.id === pt.id ? "#fff" : "none"}
                    strokeWidth={2}
                    style={{ cursor: "pointer", transition: "r 0.15s" }}
                    onClick={() => setSelectedEvent(selectedEvent && selectedEvent.id === pt.id ? null : pt)}
                  />
                ))}
              </svg>
            </div>

            {selectedEvent && (
              <div style={{ background: "#151c2c", borderRadius: 12, padding: "1.25rem", marginBottom: "1.5rem", borderLeft: "4px solid " + INDUSTRY_COLORS[selectedEvent.industry] }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "0.5rem" }}>
                  <div>
                    <h3 style={{ fontSize: "1.1rem", fontWeight: 600, marginBottom: "0.35rem" }}>{selectedEvent.headline}</h3>
                    <p style={{ color: "#94a3b8", fontSize: "0.85rem" }}>
                      {selectedEvent.date} &middot; {selectedEvent.industry} &middot; <span style={{ color: INDUSTRY_COLORS[selectedEvent.industry], fontWeight: 600 }}>{selectedEvent.ticker}</span>
                    </p>
                  </div>
                  <span style={{
                    background: REC_COLORS[selectedEvent.recommendation],
                    color: selectedEvent.recommendation === "HOLD" ? "#000" : "#fff",
                    padding: "4px 14px",
                    borderRadius: 999,
                    fontSize: "0.8rem",
                    fontWeight: 700,
                    letterSpacing: "0.05em",
                  }}>
                    {selectedEvent.recommendation}
                  </span>
                </div>
                <p style={{ marginTop: "0.75rem", color: "#cbd5e1", fontSize: "0.9rem", lineHeight: 1.5 }}>{selectedEvent.reason}</p>
              </div>
            )}

            <div style={{ background: "#151c2c", borderRadius: 12, overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "0.85rem" }}>
                <thead>
                  <tr style={{ borderBottom: "1px solid #1e293b" }}>
                    {["Date", "Ticker", "Industry", "Impact", "Headline", "Rec."].map((h) => (
                      <th key={h} style={{ padding: "12px 14px", textAlign: "left", color: "#64748b", fontWeight: 600, fontSize: "0.75rem", textTransform: "uppercase", letterSpacing: "0.05em" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {EVENTS.map((ev) => (
                    <tr
                      key={ev.id}
                      onClick={() => setSelectedEvent(selectedEvent && selectedEvent.id === ev.id ? null : ev)}
                      style={{ borderBottom: "1px solid #1e293b", cursor: "pointer", background: selectedEvent && selectedEvent.id === ev.id ? "rgba(129,140,248,0.08)" : "transparent" }}
                    >
                      <td style={{ padding: "10px 14px", color: "#94a3b8" }}>{ev.date.slice(5)}</td>
                      <td style={{ padding: "10px 14px", fontWeight: 600, color: INDUSTRY_COLORS[ev.industry] }}>{ev.ticker}</td>
                      <td style={{ padding: "10px 14px" }}>
                        <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ width: 8, height: 8, borderRadius: "50%", background: INDUSTRY_COLORS[ev.industry], display: "inline-block" }} />
                          {ev.industry}
                        </span>
                      </td>
                      <td style={{ padding: "10px 14px", color: ev.impact === "High" ? "#f87171" : "#fbbf24" }}>{ev.impact}</td>
                      <td style={{ padding: "10px 14px", maxWidth: 280, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.headline}</td>
                      <td style={{ padding: "10px 14px" }}>
                        <span style={{
                          background: REC_COLORS[ev.recommendation],
                          color: ev.recommendation === "HOLD" ? "#000" : "#fff",
                          padding: "2px 10px",
                          borderRadius: 999,
                          fontSize: "0.75rem",
                          fontWeight: 700,
                        }}>
                          {ev.recommendation}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <p style={{ color: "#475569", fontSize: "0.75rem", marginTop: "1.5rem", textAlign: "center" }}>
              Data sourced from CNBC, TheStreet, Motley Fool, TipRanks &middot; Not financial advice
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>

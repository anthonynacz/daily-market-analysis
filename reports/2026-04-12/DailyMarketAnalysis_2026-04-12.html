<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Analysis — April 12, 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const EVENTS = [
      { id: 1, date: "Apr 9", dayIndex: 0, impact: "High", impactVal: 3, industry: "Energy", ticker: "XOM", headline: "US-Iran Ceasefire Sparks Market Rally", recommendation: "SELL", reason: "Ceasefire easing oil supply fears; energy sector may face downside pressure as geopolitical risk premium unwinds." },
      { id: 2, date: "Apr 9", dayIndex: 0, impact: "High", impactVal: 3, industry: "Tech", ticker: "META", headline: "Meta Commits $21B to CoreWeave AI Infrastructure", recommendation: "BUY", reason: "Massive AI infrastructure investment signals long-term growth conviction and deepening moat in AI compute." },
      { id: 3, date: "Apr 10", dayIndex: 1, impact: "High", impactVal: 3, industry: "Finance", ticker: "SPY", headline: "CPI Inflation at 3.4% — Persistent Price Pressure", recommendation: "WATCH", reason: "Core CPI at 3.7% keeps rate-cut expectations subdued; monitor Fed rhetoric for forward guidance." },
      { id: 4, date: "Apr 10", dayIndex: 1, impact: "High", impactVal: 3, industry: "Tech", ticker: "NVDA", headline: "Nvidia Leads Semiconductor Rally Amid AI Demand Surge", recommendation: "BUY", reason: "Narrow market breadth favoring AI chips; Nvidia riding structural demand tailwinds from hyperscaler capex." },
      { id: 5, date: "Apr 10", dayIndex: 1, impact: "Medium", impactVal: 2, industry: "Tech", ticker: "CRM", headline: "Software Sector Selloff on AI Disruption Fears", recommendation: "HOLD", reason: "SaaS disruption fears overblown for market leaders actively integrating AI into product suites." },
      { id: 6, date: "Apr 13", dayIndex: 4, impact: "High", impactVal: 3, industry: "Finance", ticker: "GS", headline: "Goldman Sachs Q1 2026 Earnings Report", recommendation: "WATCH", reason: "First major bank to report Q1; will set the tone for the entire financial sector this earnings season." },
      { id: 7, date: "Apr 14", dayIndex: 5, impact: "High", impactVal: 3, industry: "Finance", ticker: "JPM", headline: "JPMorgan Chase Q1 2026 Earnings Report", recommendation: "BUY", reason: "Strongest big bank positioned to beat on trading revenue and net interest income growth." },
      { id: 8, date: "Apr 14", dayIndex: 5, impact: "High", impactVal: 3, industry: "Healthcare", ticker: "JNJ", headline: "Johnson & Johnson Q1 2026 Earnings Report", recommendation: "HOLD", reason: "Steady defensive performer but MedTech segment growth and litigation outlook are key to watch." },
      { id: 9, date: "Apr 14", dayIndex: 5, impact: "Medium", impactVal: 2, industry: "Finance", ticker: "BLK", headline: "BlackRock Q1 2026 Earnings Report", recommendation: "WATCH", reason: "Record AUM expected from ETF inflows but fee compression and alt-asset integration remain concerns." },
      { id: 10, date: "Apr 15", dayIndex: 6, impact: "Medium", impactVal: 2, industry: "Finance", ticker: "BAC", headline: "Bank of America Q1 2026 Earnings Report", recommendation: "HOLD", reason: "NII tailwinds from higher rates partially offset by rising consumer credit delinquency trends." },
      { id: 11, date: "Apr 16", dayIndex: 7, impact: "High", impactVal: 3, industry: "Finance", ticker: "XRT", headline: "Advance Retail Sales Report Release", recommendation: "WATCH", reason: "Consumer spending data critical for gauging economic resilience amid persistent inflation headwinds." },
      { id: 12, date: "Apr 16", dayIndex: 7, impact: "High", impactVal: 3, industry: "Tech", ticker: "NFLX", headline: "Netflix Q1 2026 Earnings Report", recommendation: "BUY", reason: "Ad-tier growth and password sharing crackdown continue to boost subscriber additions and ARPU." },
      { id: 13, date: "Apr 16", dayIndex: 7, impact: "Medium", impactVal: 2, industry: "Healthcare", ticker: "ABT", headline: "Abbott Laboratories Q1 2026 Earnings Report", recommendation: "HOLD", reason: "Diagnostics revenue normalization may weigh on results; watch MedTech guidance for growth signal." },
      { id: 14, date: "Apr 17", dayIndex: 8, impact: "Medium", impactVal: 2, industry: "Energy", ticker: "CVX", headline: "Oil Volatility — Iran Ceasefire Expiry Watch", recommendation: "WATCH", reason: "Two-week ceasefire window closing April 20; renewal uncertainty adds significant risk premium." },
    ];

    const INDUSTRY_COLORS = { Tech: "#818cf8", Healthcare: "#34d399", Energy: "#fbbf24", Finance: "#fb7185" };
    const REC_COLORS = { BUY: "#22c55e", SELL: "#ef4444", HOLD: "#eab308", WATCH: "#3b82f6" };
    const DATES = ["Apr 9", "Apr 10", "Apr 11", "Apr 12", "Apr 13", "Apr 14", "Apr 15", "Apr 16", "Apr 17"];
    const TODAY_INDEX = 3;

    function App() {
      const [selected, setSelected] = useState(null);

      const chartW = 780;
      const chartH = 360;
      const margin = { top: 30, right: 30, bottom: 50, left: 60 };
      const plotW = chartW - margin.left - margin.right;
      const plotH = chartH - margin.top - margin.bottom;

      const positions = useMemo(() => {
        const groups = {};
        EVENTS.forEach((e) => {
          const key = e.dayIndex + "-" + e.impactVal;
          if (!groups[key]) groups[key] = [];
          groups[key].push(e.id);
        });
        return EVENTS.map((e) => {
          const key = e.dayIndex + "-" + e.impactVal;
          const siblings = groups[key];
          const idx = siblings.indexOf(e.id);
          const spread = 18;
          const offset = (idx - (siblings.length - 1) / 2) * spread;
          const cx = margin.left + (e.dayIndex / (DATES.length - 1)) * plotW + offset;
          const cy = margin.top + plotH - ((e.impactVal - 1) / 2) * plotH;
          return Object.assign({}, e, { cx: cx, cy: cy });
        });
      }, []);

      const todayX = margin.left + (TODAY_INDEX / (DATES.length - 1)) * plotW;

      return (
        React.createElement("div", { style: { minHeight: "100vh", background: "#0b0f1a", color: "#e2e8f0", fontFamily: "'Inter', 'Segoe UI', system-ui, sans-serif", padding: "32px 24px" } },
          React.createElement("div", { style: { maxWidth: 900, margin: "0 auto" } },
            React.createElement("h1", { style: { fontSize: 28, fontWeight: 700, marginBottom: 4 } }, "Daily Market Analysis"),
            React.createElement("p", { style: { color: "#94a3b8", fontSize: 14, marginBottom: 24 } }, "April 12, 2026 \u2014 14 events across Tech, Healthcare, Energy & Finance"),

            /* Legend */
            React.createElement("div", { style: { display: "flex", gap: 20, marginBottom: 16, flexWrap: "wrap" } },
              Object.entries(INDUSTRY_COLORS).map(function([name, color]) {
                return React.createElement("div", { key: name, style: { display: "flex", alignItems: "center", gap: 6 } },
                  React.createElement("div", { style: { width: 12, height: 12, borderRadius: "50%", background: color } }),
                  React.createElement("span", { style: { fontSize: 13, color: "#cbd5e1" } }, name)
                );
              })
            ),

            /* SVG Chart */
            React.createElement("div", { style: { background: "#151c2c", borderRadius: 12, padding: 16, marginBottom: 24 } },
              React.createElement("svg", { viewBox: "0 0 " + chartW + " " + chartH, style: { width: "100%", height: "auto" } },
                /* Past bg */
                React.createElement("rect", { x: margin.left, y: margin.top, width: todayX - margin.left, height: plotH, fill: "rgba(239,68,68,0.06)" }),
                /* Future bg */
                React.createElement("rect", { x: todayX, y: margin.top, width: margin.left + plotW - todayX, height: plotH, fill: "rgba(34,197,94,0.06)" }),

                /* Grid lines */
                [1, 2, 3].map(function(level) {
                  var y = margin.top + plotH - ((level - 1) / 2) * plotH;
                  return React.createElement("g", { key: level },
                    React.createElement("line", { x1: margin.left, y1: y, x2: margin.left + plotW, y2: y, stroke: "#1e293b", strokeWidth: 1 }),
                    React.createElement("text", { x: margin.left - 10, y: y + 4, textAnchor: "end", fill: "#64748b", fontSize: 12 },
                      level === 1 ? "Low" : level === 2 ? "Med" : "High"
                    )
                  );
                }),

                /* X axis labels */
                DATES.map(function(d, i) {
                  var x = margin.left + (i / (DATES.length - 1)) * plotW;
                  return React.createElement("text", { key: d, x: x, y: chartH - 10, textAnchor: "middle", fill: "#64748b", fontSize: 11 }, d);
                }),

                /* Today line */
                React.createElement("line", { x1: todayX, y1: margin.top, x2: todayX, y2: margin.top + plotH, stroke: "#ef4444", strokeWidth: 2, strokeDasharray: "6 4" }),
                React.createElement("text", { x: todayX, y: margin.top - 8, textAnchor: "middle", fill: "#ef4444", fontSize: 11, fontWeight: 600 }, "TODAY"),

                /* Event dots */
                positions.map(function(e) {
                  return React.createElement("g", { key: e.id, style: { cursor: "pointer" }, onClick: function() { setSelected(selected && selected.id === e.id ? null : e); } },
                    React.createElement("circle", { cx: e.cx, cy: e.cy, r: selected && selected.id === e.id ? 10 : 8, fill: INDUSTRY_COLORS[e.industry], opacity: 0.9, stroke: selected && selected.id === e.id ? "#fff" : "none", strokeWidth: 2 }),
                    React.createElement("text", { x: e.cx, y: e.cy - 12, textAnchor: "middle", fill: "#cbd5e1", fontSize: 9, fontWeight: 600 }, e.ticker)
                  );
                })
              )
            ),

            /* Detail panel */
            selected && React.createElement("div", { style: { background: "#151c2c", borderRadius: 12, padding: 20, marginBottom: 24, borderLeft: "4px solid " + INDUSTRY_COLORS[selected.industry] } },
              React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 12 } },
                React.createElement("div", null,
                  React.createElement("h3", { style: { fontSize: 18, fontWeight: 600, marginBottom: 4 } }, selected.headline),
                  React.createElement("p", { style: { color: "#94a3b8", fontSize: 13, margin: 0 } },
                    selected.ticker + " \u2022 " + selected.industry + " \u2022 " + selected.date + " \u2022 Impact: " + selected.impact
                  )
                ),
                React.createElement("span", { style: { display: "inline-block", padding: "4px 14px", borderRadius: 20, fontSize: 13, fontWeight: 700, color: "#fff", background: REC_COLORS[selected.recommendation] } }, selected.recommendation)
              ),
              React.createElement("p", { style: { color: "#cbd5e1", fontSize: 14, marginTop: 12, lineHeight: 1.6 } }, selected.reason)
            ),

            /* Table */
            React.createElement("div", { style: { background: "#151c2c", borderRadius: 12, overflow: "hidden" } },
              React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 13 } },
                React.createElement("thead", null,
                  React.createElement("tr", { style: { background: "#1e293b" } },
                    ["Date", "Ticker", "Headline", "Industry", "Impact", "Rec"].map(function(h) {
                      return React.createElement("th", { key: h, style: { padding: "10px 12px", textAlign: "left", color: "#94a3b8", fontWeight: 600, fontSize: 12 } }, h);
                    })
                  )
                ),
                React.createElement("tbody", null,
                  EVENTS.map(function(e) {
                    return React.createElement("tr", {
                      key: e.id,
                      style: { borderBottom: "1px solid #1e293b", cursor: "pointer", background: selected && selected.id === e.id ? "#1e293b" : "transparent" },
                      onClick: function() { setSelected(selected && selected.id === e.id ? null : e); }
                    },
                      React.createElement("td", { style: { padding: "10px 12px", color: "#94a3b8" } }, e.date),
                      React.createElement("td", { style: { padding: "10px 12px", fontWeight: 600, color: INDUSTRY_COLORS[e.industry] } }, e.ticker),
                      React.createElement("td", { style: { padding: "10px 12px", color: "#e2e8f0" } }, e.headline),
                      React.createElement("td", { style: { padding: "10px 12px", color: INDUSTRY_COLORS[e.industry] } }, e.industry),
                      React.createElement("td", { style: { padding: "10px 12px", color: e.impact === "High" ? "#f87171" : "#fbbf24" } }, e.impact),
                      React.createElement("td", { style: { padding: "10px 12px" } },
                        React.createElement("span", { style: { display: "inline-block", padding: "2px 10px", borderRadius: 12, fontSize: 11, fontWeight: 700, color: "#fff", background: REC_COLORS[e.recommendation] } }, e.recommendation)
                      )
                    );
                  })
                )
              )
            ),

            React.createElement("p", { style: { color: "#475569", fontSize: 11, marginTop: 24, textAlign: "center" } },
              "Generated on April 12, 2026. For informational purposes only \u2014 not financial advice."
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
  </script>
</body>
</html>

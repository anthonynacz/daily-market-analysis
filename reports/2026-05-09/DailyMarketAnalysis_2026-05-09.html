<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>US Market Pulse — Recency × Impact Matrix</title>
<style>
  html, body { margin: 0; background: #0b0f1a; }
  body { padding: 16px; -webkit-text-size-adjust: 100%; }
  #root { max-width: 1000px; margin: 0 auto; }
  .boot { color:#64748b; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; text-align:center; padding:40px 16px; font-size:14px; }
  .err  { color:#f87171; font-family:ui-monospace,monospace; white-space:pre-wrap; padding:16px; font-size:12px; }
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="boot">Loading market matrix…</div></div>
<script id="jsx-source" type="text/plain">
const { useState, useMemo } = React;

const EVENTS = [
  { id: 1, headline: "Akamai Q1 Earnings Beat, Raises Full-Year Outlook", ticker: "AKAM", industry: "Tech", date: "2026-05-08", impact: "High", recommendation: "BUY", reason: "Strong cloud delivery growth and raised guidance signal continued momentum" },
  { id: 2, headline: "Rackspace-AMD AI Cloud Partnership Announced", ticker: "RXT", industry: "Tech", date: "2026-05-08", impact: "Medium", recommendation: "WATCH", reason: "MOU with AMD for enterprise AI cloud could drive future revenue streams" },
  { id: 3, headline: "ARM Holdings Q1 Earnings Report", ticker: "ARM", industry: "Tech", date: "2026-05-06", impact: "High", recommendation: "HOLD", reason: "Solid results but premium valuation limits near-term upside" },
  { id: 4, headline: "Ubiquiti Q3 Earnings Report", ticker: "UI", industry: "Tech", date: "2026-05-08", impact: "Medium", recommendation: "HOLD", reason: "Steady networking demand but margin pressure from component costs" },
  { id: 5, headline: "Novo Nordisk Q1 Earnings Report", ticker: "NVO", industry: "Healthcare", date: "2026-05-06", impact: "High", recommendation: "HOLD", reason: "GLP-1 demand remains strong but competitive pressure is building" },
  { id: 6, headline: "Eli Lilly Obesity Drug Phase 3 Trial Update", ticker: "LLY", industry: "Healthcare", date: "2026-05-13", impact: "High", recommendation: "BUY", reason: "Positive trial readouts expected to expand addressable market significantly" },
  { id: 7, headline: "Amgen Biosimilar Pipeline Regulatory Update", ticker: "AMGN", industry: "Healthcare", date: "2026-05-12", impact: "Medium", recommendation: "WATCH", reason: "Key biosimilar approvals could shift competitive landscape in biologics" },
  { id: 8, headline: "Shell Q1 Earnings Report", ticker: "SHEL", industry: "Energy", date: "2026-05-07", impact: "High", recommendation: "HOLD", reason: "Solid upstream results offset by weaker downstream refining margins" },
  { id: 9, headline: "Petrobras Q1 Earnings Report", ticker: "PBR", industry: "Energy", date: "2026-05-11", impact: "Medium", recommendation: "WATCH", reason: "Brazilian pre-salt production growth faces political uncertainty" },
  { id: 10, headline: "Constellation Energy Q1 Earnings Report", ticker: "CEG", industry: "Energy", date: "2026-05-11", impact: "High", recommendation: "BUY", reason: "Nuclear renaissance and AI data center power demand driving growth" },
  { id: 11, headline: "Iran Peace Deal Developments Impact Oil Prices", ticker: "XOM", industry: "Energy", date: "2026-05-08", impact: "High", recommendation: "SELL", reason: "Potential Iran deal could add crude supply and pressure oil prices lower" },
  { id: 12, headline: "April Jobs Report Beats Expectations (115K vs 65K)", ticker: "SPY", industry: "Finance", date: "2026-05-08", impact: "High", recommendation: "BUY", reason: "Stronger-than-expected labor market signals resilient economic growth" },
  { id: 13, headline: "FOMC Meeting Minutes Release", ticker: "JPM", industry: "Finance", date: "2026-05-14", impact: "High", recommendation: "WATCH", reason: "Rate path clarity expected; any hawkish surprise could rattle equity markets" },
  { id: 14, headline: "Consumer Credit Data Release", ticker: "DFS", industry: "Finance", date: "2026-05-07", impact: "Medium", recommendation: "HOLD", reason: "Credit growth remains steady but delinquency trends need close monitoring" },
];

const INDUSTRY_COLORS = { Tech: '#818cf8', Healthcare: '#34d399', Energy: '#fbbf24', Finance: '#fb7185' };
const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };
const TODAY = '2026-05-09';
const DATE_START = new Date('2026-05-06');
const DATE_END = new Date('2026-05-14');
const TOTAL_DAYS = (DATE_END - DATE_START) / 86400000;
const IMPACT_MAP = { High: 3, Medium: 2, Low: 1 };

function DailyMarketAnalysis() {
  const [selected, setSelected] = useState(null);

  const chartW = 800, chartH = 360, pad = { top: 40, right: 30, bottom: 50, left: 60 };
  const plotW = chartW - pad.left - pad.right;
  const plotH = chartH - pad.top - pad.bottom;

  const todayX = useMemo(() => {
    const d = (new Date(TODAY) - DATE_START) / 86400000;
    return pad.left + (d / TOTAL_DAYS) * plotW;
  }, []);

  const dots = useMemo(() => EVENTS.map(ev => {
    const dayOff = (new Date(ev.date) - DATE_START) / 86400000;
    const x = pad.left + (dayOff / TOTAL_DAYS) * plotW;
    const y = pad.top + plotH - ((IMPACT_MAP[ev.impact] - 0.5) / 3) * plotH;
    return { ...ev, x, y };
  }), []);

  const dateLabels = useMemo(() => {
    const labels = [];
    for (let i = 0; i <= TOTAL_DAYS; i++) {
      const d = new Date(DATE_START);
      d.setDate(d.getDate() + i);
      const str = d.toISOString().slice(0, 10);
      labels.push({ label: str.slice(5), x: pad.left + (i / TOTAL_DAYS) * plotW, full: str });
    }
    return labels;
  }, []);

  const selectedEvent = selected ? EVENTS.find(e => e.id === selected) : null;

  return (
    <div style={{ background: '#0b0f1a', minHeight: '100vh', color: '#e2e8f0', fontFamily: "'Inter', sans-serif", padding: 24 }}>
      <h1 style={{ fontSize: 28, fontWeight: 700, marginBottom: 4, color: '#f8fafc' }}>Daily Market Analysis</h1>
      <p style={{ color: '#94a3b8', marginBottom: 24, fontSize: 14 }}>May 9, 2026 — US Stock Market Events & Outlook</p>

      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        {Object.entries(INDUSTRY_COLORS).map(([ind, col]) => (
          <span key={ind} style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: '#94a3b8' }}>
            <span style={{ width: 10, height: 10, borderRadius: '50%', background: col, display: 'inline-block' }} />
            {ind}
          </span>
        ))}
      </div>

      <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 24, overflowX: 'auto' }}>
        <svg width={chartW} height={chartH} style={{ display: 'block', margin: '0 auto' }}>
          <rect x={pad.left} y={pad.top} width={todayX - pad.left} height={plotH} fill="rgba(239,68,68,0.06)" />
          <rect x={todayX} y={pad.top} width={pad.left + plotW - todayX} height={plotH} fill="rgba(34,197,94,0.06)" />
          <line x1={todayX} y1={pad.top} x2={todayX} y2={pad.top + plotH} stroke="#ef4444" strokeWidth={2} strokeDasharray="6,4" />
          <text x={todayX} y={pad.top - 8} fill="#ef4444" fontSize={11} textAnchor="middle" fontWeight={600}>TODAY</text>

          {[1, 2, 3].map(lv => {
            const y = pad.top + plotH - ((lv - 0.5) / 3) * plotH;
            return (
              <g key={lv}>
                <line x1={pad.left} y1={y} x2={pad.left + plotW} y2={y} stroke="#1e293b" strokeWidth={1} />
                <text x={pad.left - 10} y={y + 4} fill="#64748b" fontSize={11} textAnchor="end">
                  {lv === 3 ? 'High' : lv === 2 ? 'Med' : 'Low'}
                </text>
              </g>
            );
          })}

          {dateLabels.map((dl, i) => (
            <text key={i} x={dl.x} y={pad.top + plotH + 20} fill="#64748b" fontSize={10} textAnchor="middle">{dl.label}</text>
          ))}

          <text x={chartW / 2} y={chartH - 4} fill="#64748b" fontSize={11} textAnchor="middle">Date</text>
          <text x={14} y={chartH / 2} fill="#64748b" fontSize={11} textAnchor="middle" transform={`rotate(-90,14,${chartH / 2})`}>Impact</text>

          {dots.map(dot => (
            <g key={dot.id} onClick={() => setSelected(dot.id === selected ? null : dot.id)} style={{ cursor: 'pointer' }}>
              <circle cx={dot.x} cy={dot.y} r={selected === dot.id ? 10 : 7} fill={INDUSTRY_COLORS[dot.industry]} opacity={0.9} stroke={selected === dot.id ? '#fff' : 'none'} strokeWidth={2} />
              <text x={dot.x} y={dot.y - 12} fill="#cbd5e1" fontSize={9} textAnchor="middle" fontWeight={500}>{dot.ticker}</text>
            </g>
          ))}
        </svg>
      </div>

      {selectedEvent && (
        <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 24, border: '1px solid #1e293b' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
            <div>
              <h3 style={{ fontSize: 18, fontWeight: 600, marginBottom: 6, color: '#f8fafc' }}>{selectedEvent.headline}</h3>
              <p style={{ color: '#94a3b8', fontSize: 13, marginBottom: 8 }}>
                <span style={{ color: INDUSTRY_COLORS[selectedEvent.industry], fontWeight: 600 }}>{selectedEvent.industry}</span> &middot; {selectedEvent.ticker} &middot; {selectedEvent.date} &middot; Impact: {selectedEvent.impact}
              </p>
              <p style={{ color: '#cbd5e1', fontSize: 14 }}>{selectedEvent.reason}</p>
            </div>
            <span style={{
              background: REC_COLORS[selectedEvent.recommendation],
              color: selectedEvent.recommendation === 'HOLD' ? '#000' : '#fff',
              padding: '6px 16px',
              borderRadius: 999,
              fontWeight: 700,
              fontSize: 13,
              whiteSpace: 'nowrap'
            }}>
              {selectedEvent.recommendation}
            </span>
          </div>
        </div>
      )}

      <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, overflowX: 'auto' }}>
        <h2 style={{ fontSize: 18, fontWeight: 600, marginBottom: 16, color: '#f8fafc' }}>All Events</h2>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ borderBottom: '1px solid #1e293b' }}>
              {['Date', 'Ticker', 'Headline', 'Industry', 'Impact', 'Rec'].map(h => (
                <th key={h} style={{ padding: '8px 12px', textAlign: 'left', color: '#64748b', fontWeight: 600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {EVENTS.map(ev => (
              <tr key={ev.id} style={{ borderBottom: '1px solid #1e293b22', cursor: 'pointer' }} onClick={() => setSelected(ev.id)}>
                <td style={{ padding: '8px 12px', color: '#94a3b8' }}>{ev.date}</td>
                <td style={{ padding: '8px 12px', fontWeight: 600, color: INDUSTRY_COLORS[ev.industry] }}>{ev.ticker}</td>
                <td style={{ padding: '8px 12px', color: '#cbd5e1' }}>{ev.headline}</td>
                <td style={{ padding: '8px 12px', color: INDUSTRY_COLORS[ev.industry] }}>{ev.industry}</td>
                <td style={{ padding: '8px 12px', color: ev.impact === 'High' ? '#f8fafc' : '#94a3b8' }}>{ev.impact}</td>
                <td style={{ padding: '8px 12px' }}>
                  <span style={{
                    background: REC_COLORS[ev.recommendation],
                    color: ev.recommendation === 'HOLD' ? '#000' : '#fff',
                    padding: '2px 10px',
                    borderRadius: 999,
                    fontWeight: 600,
                    fontSize: 11
                  }}>
                    {ev.recommendation}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <p style={{ textAlign: 'center', color: '#475569', fontSize: 11, marginTop: 24 }}>
        Generated on 2026-05-09. For informational purposes only — not financial advice.
      </p>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<DailyMarketAnalysis />);
</script>
<script>
  (function () {
    try {
      var src = document.getElementById("jsx-source").textContent;
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      var s = document.createElement("script");
      s.text = out;
      document.body.appendChild(s);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div class="err">Render error: ' + (e && e.message ? e.message : e) + '</div>';
      console.error(e);
    }
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>US Market Pulse — Recency × Impact Matrix</title>
<style>
  html, body { margin: 0; background: #0b0f1a; }
  body { padding: 16px; -webkit-text-size-adjust: 100%; }
  #root { max-width: 1000px; margin: 0 auto; }
  .boot { color:#64748b; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; text-align:center; padding:40px 16px; font-size:14px; }
  .err  { color:#f87171; font-family:ui-monospace,monospace; white-space:pre-wrap; padding:16px; font-size:12px; }
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="boot">Loading market matrix…</div></div>
<script id="jsx-source" type="text/plain">
const { useState, useMemo } = React;

const INDUSTRY_COLORS = {
  Tech: '#818cf8',
  Healthcare: '#34d399',
  Energy: '#fbbf24',
  Finance: '#fb7185',
};

const EVENTS = [
  { id: 1, headline: 'Snowflake earnings beat, AWS $6B Graviton deal announced', ticker: 'SNOW', industry: 'Tech', date: '2026-05-27', impact: 'High', recommendation: 'BUY', reason: 'Revenue up 33% to $1.39B with major AWS partnership accelerating cloud data momentum.' },
  { id: 2, headline: 'Micron chip rally continues — up 73% month-to-date', ticker: 'MU', industry: 'Tech', date: '2026-05-27', impact: 'High', recommendation: 'HOLD', reason: 'Exceptional run but technically overextended; wait for pullback before adding.' },
  { id: 3, headline: 'Salesforce Q1 earnings report', ticker: 'CRM', industry: 'Tech', date: '2026-05-27', impact: 'High', recommendation: 'WATCH', reason: 'AI-driven enterprise demand key; results will signal broader SaaS health.' },
  { id: 4, headline: 'Dell Technologies Q1 earnings report', ticker: 'DELL', industry: 'Tech', date: '2026-05-28', impact: 'Medium', recommendation: 'WATCH', reason: 'Server and AI infrastructure revenue growth expected to be the highlight.' },
  { id: 5, headline: 'Marvell Technology Q1 earnings report', ticker: 'MRVL', industry: 'Tech', date: '2026-05-27', impact: 'Medium', recommendation: 'WATCH', reason: 'Custom silicon and data center chip demand in focus after Micron surge.' },
  { id: 6, headline: 'JPMorgan signals potential $20B acquisition', ticker: 'JPM', industry: 'Finance', date: '2026-05-27', impact: 'High', recommendation: 'HOLD', reason: 'Stock dipped 3% on dilution fears; long-term strategic value depends on target.' },
  { id: 7, headline: 'Goldman Sachs raises S&P 500 year-end target to 8,000', ticker: 'GS', industry: 'Finance', date: '2026-05-27', impact: 'Medium', recommendation: 'BUY', reason: 'Bullish outlook reflects strong earnings cycle; GS well-positioned in capital markets.' },
  { id: 8, headline: 'Costco Q3 earnings report', ticker: 'COST', industry: 'Finance', date: '2026-05-29', impact: 'Medium', recommendation: 'WATCH', reason: 'Membership growth and same-store sales will gauge consumer spending resilience.' },
  { id: 9, headline: 'Oil crashes 5.55% on Iran Strait of Hormuz reopening', ticker: 'USO', industry: 'Energy', date: '2026-05-27', impact: 'High', recommendation: 'SELL', reason: 'Geopolitical risk premium unwinding rapidly; crude could test $85 support.' },
  { id: 10, headline: 'Exxon Mobil pressured by oil price decline', ticker: 'XOM', industry: 'Energy', date: '2026-05-28', impact: 'High', recommendation: 'SELL', reason: 'Downstream margins compressing as crude falls; near-term headwinds outweigh dividend yield.' },
  { id: 11, headline: 'Chevron refining margins under pressure', ticker: 'CVX', industry: 'Energy', date: '2026-05-28', impact: 'Medium', recommendation: 'HOLD', reason: 'Diversified portfolio provides some buffer but energy sector facing broad weakness.' },
  { id: 12, headline: 'Dr. Reddy\'s Laboratories quarterly results filed', ticker: 'RDY', industry: 'Healthcare', date: '2026-05-26', impact: 'Medium', recommendation: 'HOLD', reason: 'Generic drug pipeline steady but limited upside catalysts near-term.' },
  { id: 13, headline: 'Pfizer oncology pipeline readout expected', ticker: 'PFE', industry: 'Healthcare', date: '2026-05-29', impact: 'Medium', recommendation: 'WATCH', reason: 'Phase 3 data could re-rate shares if results are positive.' },
  { id: 14, headline: 'UnitedHealth Medicare Advantage expansion review', ticker: 'UNH', industry: 'Healthcare', date: '2026-06-01', impact: 'Medium', recommendation: 'BUY', reason: 'Regulatory tailwinds and aging demographics support long-term growth thesis.' },
];

const TODAY = '2026-05-28';

const DATES = [
  '2026-05-25', '2026-05-26', '2026-05-27', '2026-05-28',
  '2026-05-29', '2026-05-30', '2026-05-31', '2026-06-01', '2026-06-02',
];

const DATE_LABELS = ['May 25', 'May 26', 'May 27', 'May 28', 'May 29', 'May 30', 'May 31', 'Jun 1', 'Jun 2'];

const IMPACT_MAP = { Low: 1, Medium: 2, High: 3 };
const IMPACT_LABELS = ['Low', 'Medium', 'High'];

const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };

const CHART = { width: 820, height: 360, padLeft: 70, padRight: 30, padTop: 30, padBottom: 50 };

function DailyMarketAnalysis() {
  const [selected, setSelected] = useState(null);
  const [filterIndustry, setFilterIndustry] = useState('All');

  const filtered = useMemo(() =>
    filterIndustry === 'All' ? EVENTS : EVENTS.filter(e => e.industry === filterIndustry),
    [filterIndustry]
  );

  const plotW = CHART.width - CHART.padLeft - CHART.padRight;
  const plotH = CHART.height - CHART.padTop - CHART.padBottom;
  const todayIdx = DATES.indexOf(TODAY);

  function xPos(date) {
    const idx = DATES.indexOf(date);
    return CHART.padLeft + (idx / (DATES.length - 1)) * plotW;
  }

  function yPos(impact) {
    return CHART.padTop + plotH - ((IMPACT_MAP[impact] - 0.5) / 3) * plotH;
  }

  const todayX = xPos(TODAY);

  const selectedEvent = selected !== null ? EVENTS.find(e => e.id === selected) : null;

  return (
    <div style={{ minHeight: '100vh', backgroundColor: '#0b0f1a', color: '#e2e8f0', fontFamily: "'Inter', 'Segoe UI', sans-serif", padding: '24px' }}>
      <div style={{ maxWidth: 900, margin: '0 auto' }}>
        <h1 style={{ fontSize: 28, fontWeight: 700, marginBottom: 4 }}>Daily Market Analysis</h1>
        <p style={{ color: '#94a3b8', marginBottom: 24, fontSize: 14 }}>May 28, 2026 — Dow record 50,644 | Oil -5.55% on Iran news | Chip rally extends</p>

        <div style={{ display: 'flex', gap: 8, marginBottom: 16, flexWrap: 'wrap' }}>
          {['All', 'Tech', 'Healthcare', 'Energy', 'Finance'].map(ind => (
            <button
              key={ind}
              onClick={() => setFilterIndustry(ind)}
              style={{
                padding: '6px 14px', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 600,
                backgroundColor: filterIndustry === ind ? (INDUSTRY_COLORS[ind] || '#6366f1') : '#1e293b',
                color: filterIndustry === ind ? '#0b0f1a' : '#94a3b8',
              }}
            >{ind}</button>
          ))}
        </div>

        <div style={{ backgroundColor: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 20 }}>
          <svg width={CHART.width} height={CHART.height} style={{ width: '100%', height: 'auto' }} viewBox={`0 0 ${CHART.width} ${CHART.height}`}>
            <rect x={CHART.padLeft} y={CHART.padTop} width={todayX - CHART.padLeft} height={plotH} fill="rgba(239,68,68,0.06)" />
            <rect x={todayX} y={CHART.padTop} width={CHART.padLeft + plotW - todayX} height={plotH} fill="rgba(34,197,94,0.06)" />

            <line x1={todayX} y1={CHART.padTop} x2={todayX} y2={CHART.padTop + plotH} stroke="#ef4444" strokeWidth={2} strokeDasharray="6,4" />
            <text x={todayX} y={CHART.padTop - 8} fill="#ef4444" fontSize={11} textAnchor="middle" fontWeight={600}>TODAY</text>

            {DATES.map((d, i) => (
              <g key={d}>
                <line x1={xPos(d)} y1={CHART.padTop} x2={xPos(d)} y2={CHART.padTop + plotH} stroke="#1e293b" strokeWidth={1} />
                <text x={xPos(d)} y={CHART.height - 10} fill="#64748b" fontSize={11} textAnchor="middle">{DATE_LABELS[i]}</text>
              </g>
            ))}

            {IMPACT_LABELS.map((label, i) => {
              const y = CHART.padTop + plotH - ((i + 0.5) / 3) * plotH;
              return (
                <g key={label}>
                  <line x1={CHART.padLeft} y1={y} x2={CHART.padLeft + plotW} y2={y} stroke="#1e293b" strokeWidth={1} />
                  <text x={CHART.padLeft - 10} y={y + 4} fill="#64748b" fontSize={11} textAnchor="end">{label}</text>
                </g>
              );
            })}

            {filtered.map((event, idx) => {
              const cx = xPos(event.date);
              const cy = yPos(event.impact);
              const jitter = (idx % 3 - 1) * 12;
              return (
                <g key={event.id} onClick={() => setSelected(selected === event.id ? null : event.id)} style={{ cursor: 'pointer' }}>
                  <circle cx={cx + jitter} cy={cy} r={selected === event.id ? 10 : 7} fill={INDUSTRY_COLORS[event.industry]} opacity={selected === event.id ? 1 : 0.85} stroke={selected === event.id ? '#fff' : 'none'} strokeWidth={2} />
                  <title>{event.ticker}: {event.headline}</title>
                </g>
              );
            })}
          </svg>

          <div style={{ display: 'flex', gap: 16, justifyContent: 'center', marginTop: 8 }}>
            {Object.entries(INDUSTRY_COLORS).map(([name, color]) => (
              <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12, color: '#94a3b8' }}>
                <div style={{ width: 10, height: 10, borderRadius: '50%', backgroundColor: color }} />
                {name}
              </div>
            ))}
          </div>
        </div>

        {selectedEvent && (
          <div style={{ backgroundColor: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 20, borderLeft: `4px solid ${INDUSTRY_COLORS[selectedEvent.industry]}` }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 8 }}>
              <div>
                <h3 style={{ fontSize: 18, fontWeight: 600, margin: 0 }}>{selectedEvent.headline}</h3>
                <p style={{ color: '#94a3b8', fontSize: 13, margin: '6px 0' }}>{selectedEvent.ticker} · {selectedEvent.industry} · {selectedEvent.date} · Impact: {selectedEvent.impact}</p>
              </div>
              <span style={{
                padding: '4px 14px', borderRadius: 20, fontSize: 13, fontWeight: 700,
                backgroundColor: REC_COLORS[selectedEvent.recommendation],
                color: selectedEvent.recommendation === 'HOLD' ? '#0b0f1a' : '#fff',
              }}>{selectedEvent.recommendation}</span>
            </div>
            <p style={{ fontSize: 14, color: '#cbd5e1', marginTop: 10, lineHeight: 1.5 }}>{selectedEvent.reason}</p>
          </div>
        )}

        <div style={{ backgroundColor: '#151c2c', borderRadius: 12, overflow: 'hidden' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr style={{ borderBottom: '1px solid #1e293b' }}>
                {['Date', 'Ticker', 'Headline', 'Industry', 'Impact', 'Rec'].map(h => (
                  <th key={h} style={{ padding: '12px 10px', textAlign: 'left', color: '#64748b', fontWeight: 600, fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map(event => (
                <tr
                  key={event.id}
                  onClick={() => setSelected(selected === event.id ? null : event.id)}
                  style={{ borderBottom: '1px solid #1e293b', cursor: 'pointer', backgroundColor: selected === event.id ? '#1e293b' : 'transparent' }}
                >
                  <td style={{ padding: '10px' }}>{event.date.slice(5)}</td>
                  <td style={{ padding: '10px', fontWeight: 600, color: INDUSTRY_COLORS[event.industry] }}>{event.ticker}</td>
                  <td style={{ padding: '10px', maxWidth: 300, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{event.headline}</td>
                  <td style={{ padding: '10px' }}>{event.industry}</td>
                  <td style={{ padding: '10px' }}>{event.impact}</td>
                  <td style={{ padding: '10px' }}>
                    <span style={{
                      padding: '2px 10px', borderRadius: 12, fontSize: 11, fontWeight: 700,
                      backgroundColor: REC_COLORS[event.recommendation],
                      color: event.recommendation === 'HOLD' ? '#0b0f1a' : '#fff',
                    }}>{event.recommendation}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <p style={{ textAlign: 'center', color: '#475569', fontSize: 11, marginTop: 20 }}>
          Generated {TODAY}. For informational purposes only — not financial advice.
        </p>
      </div>
    </div>
  );
}




ReactDOM.createRoot(document.getElementById("root")).render(<DailyMarketAnalysis />);
</script>
<script>
  (function () {
    try {
      var src = document.getElementById("jsx-source").textContent;
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      var s = document.createElement("script");
      s.text = out;
      document.body.appendChild(s);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div class="err">Render error: ' + (e && e.message ? e.message : e) + '</div>';
      console.error(e);
    }
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Analysis — 2026-04-02</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b0f1a; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const INDUSTRY_COLORS = {
      Tech: '#818cf8',
      Healthcare: '#34d399',
      Energy: '#fbbf24',
      Finance: '#fb7185',
    };

    const EVENTS = [
      { id: 1, headline: 'Intel $14.2B Ireland Fab JV Repurchase from Apollo', industry: 'Tech', date: '2026-03-31', impact: 'High', ticker: 'INTC', recommendation: 'BUY', reason: 'Major investment signals renewed chip manufacturing commitment and strategic focus.' },
      { id: 2, headline: 'SpaceX Files Confidential IPO — Space Stocks Rally', industry: 'Tech', date: '2026-04-01', impact: 'High', ticker: 'RKLB', recommendation: 'WATCH', reason: 'Space sector could see massive capital inflows if IPO proceeds.' },
      { id: 3, headline: 'AI-Driven Layoffs Surge 25% in March Across Big Tech', industry: 'Tech', date: '2026-04-01', impact: 'Medium', ticker: 'META', recommendation: 'HOLD', reason: 'Cost cuts boost margins but signal slowing workforce expansion.' },
      { id: 4, headline: 'Tesla Q1 2026 Earnings Preview — April 20', industry: 'Tech', date: '2026-04-20', impact: 'High', ticker: 'TSLA', recommendation: 'WATCH', reason: 'Key test for EV demand amid macro headwinds and rising energy costs.' },
      { id: 5, headline: 'Alphabet Q1 Earnings Preview — April 22', industry: 'Tech', date: '2026-04-22', impact: 'Medium', ticker: 'GOOG', recommendation: 'WATCH', reason: 'Ad revenue resilience and AI monetization progress in focus.' },
      { id: 6, headline: 'Crude Oil Surges Past $110 on Iran War Escalation', industry: 'Energy', date: '2026-04-02', impact: 'High', ticker: 'XOM', recommendation: 'BUY', reason: 'Geopolitical premium likely to persist near-term; majors benefit directly.' },
      { id: 7, headline: 'ConocoPhillips and Devon Energy Rally on Oil Boom', industry: 'Energy', date: '2026-04-02', impact: 'Medium', ticker: 'COP', recommendation: 'BUY', reason: 'Strong free cash flows at current oil prices support dividends and buybacks.' },
      { id: 8, headline: 'Airlines Plunge ~4% on Soaring Jet Fuel Costs', industry: 'Energy', date: '2026-04-02', impact: 'Medium', ticker: 'DAL', recommendation: 'SELL', reason: 'Margin compression inevitable with oil above $100; hedges expiring.' },
      { id: 9, headline: 'Nike Tumbles 14% on Weak Full-Year Revenue Guidance', industry: 'Finance', date: '2026-04-01', impact: 'High', ticker: 'NKE', recommendation: 'SELL', reason: 'Consumer spending weakness and geopolitical uncertainty weigh on outlook.' },
      { id: 10, headline: 'S&P 500 Futures Sink 1.7% on War Escalation Fears', industry: 'Finance', date: '2026-04-02', impact: 'High', ticker: 'SPY', recommendation: 'HOLD', reason: 'Volatility spike warrants caution; avoid panic selling into fear.' },
      { id: 11, headline: 'Nonfarm Payrolls Report Due April 3', industry: 'Finance', date: '2026-04-03', impact: 'High', ticker: 'SPY', recommendation: 'WATCH', reason: 'Key employment data could shift Fed rate outlook significantly.' },
      { id: 12, headline: 'CPI Inflation Report Due April 10', industry: 'Finance', date: '2026-04-10', impact: 'High', ticker: 'TLT', recommendation: 'WATCH', reason: 'Inflation trajectory critical for rate decisions; BofA warns of 4% headline.' },
      { id: 13, headline: 'UnitedHealth Pressured by Rising Medical Costs', industry: 'Healthcare', date: '2026-04-02', impact: 'Medium', ticker: 'UNH', recommendation: 'HOLD', reason: 'Insurance margins squeezed by medical inflation but pricing power intact.' },
      { id: 14, headline: 'Pfizer Pipeline Catalysts Expected in Early April', industry: 'Healthcare', date: '2026-04-05', impact: 'Medium', ticker: 'PFE', recommendation: 'WATCH', reason: 'Phase 3 readouts could drive sentiment; risk/reward balanced at current levels.' },
    ];

    const TODAY = '2026-04-02';
    const IMPACT_Y = { High: 3, Medium: 2, Low: 1 };
    const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };

    function parseDate(s) {
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function App() {
      const [selected, setSelected] = useState(null);

      const minDate = useMemo(() => parseDate('2026-03-30'), []);
      const maxDate = useMemo(() => parseDate('2026-04-07'), []);
      const dayRange = useMemo(() => (maxDate - minDate) / 86400000, [minDate, maxDate]);

      const chartW = 800, chartH = 300, padL = 60, padR = 30, padT = 30, padB = 50;
      const plotW = chartW - padL - padR;
      const plotH = chartH - padT - padB;

      const xScale = (dateStr) => {
        const d = parseDate(dateStr);
        return padL + ((d - minDate) / 86400000) / dayRange * plotW;
      };
      const yScale = (impact) => padT + plotH - ((IMPACT_Y[impact] - 0.5) / 3) * plotH;
      const todayX = xScale(TODAY);

      const ticks = useMemo(() => {
        const arr = [];
        const d = new Date(minDate);
        while (d <= maxDate) {
          const s = d.toISOString().slice(0, 10);
          arr.push({ label: (d.getMonth() + 1) + '/' + d.getDate(), x: xScale(s) });
          d.setDate(d.getDate() + 1);
        }
        return arr;
      }, [minDate, maxDate]);

      return (
        <div style={{ background: '#0b0f1a', color: '#e2e8f0', minHeight: '100vh', fontFamily: 'Inter, system-ui, sans-serif', padding: '2rem' }}>
          <h1 style={{ fontSize: '1.75rem', fontWeight: 700, marginBottom: '0.25rem' }}>Daily Market Analysis</h1>
          <p style={{ color: '#94a3b8', marginBottom: '1.5rem' }}>{TODAY} | 14 Events Tracked</p>

          <div style={{ display: 'flex', gap: '1rem', marginBottom: '1rem', flexWrap: 'wrap' }}>
            {Object.entries(INDUSTRY_COLORS).map(function([ind, col]) {
              return (
                <span key={ind} style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', fontSize: '0.85rem' }}>
                  <span style={{ width: 12, height: 12, borderRadius: '50%', background: col, display: 'inline-block' }} />
                  {ind}
                </span>
              );
            })}
          </div>

          <svg width={chartW} height={chartH} style={{ background: '#151c2c', borderRadius: 8, display: 'block', maxWidth: '100%' }}>
            <rect x={padL} y={padT} width={todayX - padL} height={plotH} fill="rgba(239,68,68,0.06)" />
            <rect x={todayX} y={padT} width={padL + plotW - todayX} height={plotH} fill="rgba(34,197,94,0.06)" />
            <line x1={todayX} y1={padT} x2={todayX} y2={padT + plotH} stroke="#ef4444" strokeWidth={2} strokeDasharray="6,4" />
            <text x={todayX} y={padT - 8} fill="#ef4444" fontSize={11} textAnchor="middle">TODAY</text>

            {['High', 'Medium', 'Low'].map(function(l) {
              return (
                <g key={l}>
                  <line x1={padL} y1={yScale(l)} x2={padL + plotW} y2={yScale(l)} stroke="#1e293b" strokeWidth={1} />
                  <text x={padL - 8} y={yScale(l) + 4} fill="#64748b" fontSize={11} textAnchor="end">{l}</text>
                </g>
              );
            })}

            {ticks.map(function(t, i) {
              return <text key={i} x={t.x} y={padT + plotH + 20} fill="#64748b" fontSize={10} textAnchor="middle">{t.label}</text>;
            })}

            {EVENTS.map(function(ev) {
              const cx = xScale(ev.date);
              const cy = yScale(ev.impact);
              if (cx < padL || cx > padL + plotW) return null;
              return (
                <circle
                  key={ev.id}
                  cx={cx}
                  cy={cy}
                  r={selected && selected.id === ev.id ? 9 : 7}
                  fill={INDUSTRY_COLORS[ev.industry]}
                  stroke={selected && selected.id === ev.id ? '#fff' : 'none'}
                  strokeWidth={2}
                  style={{ cursor: 'pointer', transition: 'r 0.2s' }}
                  onClick={function() { setSelected(selected && selected.id === ev.id ? null : ev); }}
                />
              );
            })}
          </svg>

          {selected && (
            <div style={{ background: '#151c2c', borderRadius: 8, padding: '1.25rem', marginTop: '1rem', maxWidth: 600, border: '1px solid #1e293b' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'start', marginBottom: '0.75rem' }}>
                <h3 style={{ fontSize: '1.1rem', fontWeight: 600, margin: 0 }}>{selected.headline}</h3>
                <button onClick={function() { setSelected(null); }} style={{ background: 'none', border: 'none', color: '#64748b', cursor: 'pointer', fontSize: '1.2rem' }}>x</button>
              </div>
              <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap', marginBottom: '0.75rem' }}>
                <span style={{ background: INDUSTRY_COLORS[selected.industry], color: '#0b0f1a', padding: '2px 10px', borderRadius: 12, fontSize: '0.8rem', fontWeight: 600 }}>{selected.industry}</span>
                <span style={{ background: REC_COLORS[selected.recommendation], color: '#fff', padding: '2px 10px', borderRadius: 12, fontSize: '0.8rem', fontWeight: 600 }}>{selected.recommendation}</span>
                <span style={{ background: '#334155', padding: '2px 10px', borderRadius: 12, fontSize: '0.8rem' }}>{selected.ticker}</span>
                <span style={{ background: '#334155', padding: '2px 10px', borderRadius: 12, fontSize: '0.8rem' }}>{selected.date}</span>
                <span style={{ background: '#334155', padding: '2px 10px', borderRadius: 12, fontSize: '0.8rem' }}>{selected.impact} Impact</span>
              </div>
              <p style={{ color: '#94a3b8', margin: 0, fontSize: '0.9rem' }}>{selected.reason}</p>
            </div>
          )}

          <h2 style={{ fontSize: '1.25rem', fontWeight: 600, marginTop: '2rem', marginBottom: '0.75rem' }}>All Events</h2>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
              <thead>
                <tr style={{ borderBottom: '1px solid #1e293b' }}>
                  {['Date', 'Ticker', 'Headline', 'Industry', 'Impact', 'Rec'].map(function(h) {
                    return <th key={h} style={{ padding: '0.6rem 0.75rem', textAlign: 'left', color: '#64748b', fontWeight: 500 }}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {EVENTS.map(function(ev) {
                  return (
                    <tr key={ev.id} onClick={function() { setSelected(ev); }} style={{ borderBottom: '1px solid #1e293b', cursor: 'pointer' }}>
                      <td style={{ padding: '0.6rem 0.75rem' }}>{ev.date}</td>
                      <td style={{ padding: '0.6rem 0.75rem', fontWeight: 600 }}>{ev.ticker}</td>
                      <td style={{ padding: '0.6rem 0.75rem' }}>{ev.headline}</td>
                      <td style={{ padding: '0.6rem 0.75rem' }}>
                        <span style={{ color: INDUSTRY_COLORS[ev.industry] }}>{ev.industry}</span>
                      </td>
                      <td style={{ padding: '0.6rem 0.75rem' }}>{ev.impact}</td>
                      <td style={{ padding: '0.6rem 0.75rem' }}>
                        <span style={{ background: REC_COLORS[ev.recommendation], color: '#fff', padding: '1px 8px', borderRadius: 10, fontSize: '0.78rem', fontWeight: 600 }}>{ev.recommendation}</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
  </script>
</body>
</html>

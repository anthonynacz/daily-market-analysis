<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Market Analysis — 2026-03-24</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b0f1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  #app { max-width: 1100px; margin: 0 auto; padding: 24px; }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const COLORS = { Tech: '#818cf8', Healthcare: '#34d399', Energy: '#fbbf24', Finance: '#fb7185' };
const REC_COLORS = { BUY: '#22c55e', SELL: '#ef4444', HOLD: '#eab308', WATCH: '#3b82f6' };

const EVENTS = [
  { id: 1, headline: 'Iran-US conflict escalates — Strait of Hormuz restricted, oil surges', industry: 'Energy', date: '2026-03-24', impact: 'High', ticker: 'XLE', rec: 'WATCH', reason: 'Geopolitical risk extremely elevated; wait for diplomatic clarity before acting.' },
  { id: 2, headline: 'Brent crude drops 10.9% on hopes of peace talks then rebounds', industry: 'Energy', date: '2026-03-23', impact: 'High', ticker: 'USO', rec: 'HOLD', reason: 'Extreme volatility — hold existing positions, avoid new entries until trend stabilizes.' },
  { id: 3, headline: 'Gold hits $4,411 as safe-haven demand surges', industry: 'Energy', date: '2026-03-24', impact: 'Medium', ticker: 'GLD', rec: 'BUY', reason: 'War premium and rate-cut uncertainty support continued upside for gold.' },
  { id: 4, headline: 'Software sector ETF (IGV) down 23% YTD on AI disruption fears', industry: 'Tech', date: '2026-03-24', impact: 'High', ticker: 'IGV', rec: 'WATCH', reason: 'Sector-wide de-rating ongoing; selective opportunities may emerge but timing is premature.' },
  { id: 5, headline: 'Salesforce drops 5%+ amid broad software selloff', industry: 'Tech', date: '2026-03-24', impact: 'High', ticker: 'CRM', rec: 'WATCH', reason: 'AI disruption narrative weighing heavily; wait for guidance clarity next quarter.' },
  { id: 6, headline: 'ServiceNow falls 4% — Mag 7 slump deepens', industry: 'Tech', date: '2026-03-24', impact: 'Medium', ticker: 'NOW', rec: 'HOLD', reason: 'Strong fundamentals but macro headwinds persist; hold for long-term investors.' },
  { id: 7, headline: 'Micron earnings expected strong — uptrend intact', industry: 'Tech', date: '2026-03-26', impact: 'High', ticker: 'MU', rec: 'BUY', reason: 'Memory demand cycle accelerating; technicals and fundamentals aligned for upside.' },
  { id: 8, headline: 'Alibaba reports Thursday — weak technicals at multi-month lows', industry: 'Tech', date: '2026-03-26', impact: 'Medium', ticker: 'BABA', rec: 'HOLD', reason: 'Revenue growth solid but geopolitical and technical weakness warrants caution.' },
  { id: 9, headline: 'Accenture earnings — AI consulting disruption in focus', industry: 'Tech', date: '2026-03-27', impact: 'Medium', ticker: 'ACN', rec: 'WATCH', reason: 'Key read on enterprise AI adoption pace; results will set tone for consulting sector.' },
  { id: 10, headline: 'Apollo $15B fund hit with massive redemption requests (11.2%)', industry: 'Finance', date: '2026-03-24', impact: 'High', ticker: 'APO', rec: 'SELL', reason: 'Redemption wave exceeds quarterly limits — signals liquidity stress and fund confidence erosion.' },
  { id: 11, headline: 'Fed holds rates at 3.50-3.75%, signals caution on cuts', industry: 'Finance', date: '2026-03-19', impact: 'High', ticker: 'SPY', rec: 'HOLD', reason: 'High oil prices may delay rate cuts; stay diversified and defensive.' },
  { id: 12, headline: 'Russell 2000 enters correction territory (-10% from highs)', industry: 'Finance', date: '2026-03-20', impact: 'Medium', ticker: 'IWM', rec: 'WATCH', reason: 'Small caps under pressure from rate uncertainty; watch for capitulation buying signal.' },
  { id: 13, headline: 'Consumer Sentiment Index final reading due — consensus 55.5', industry: 'Finance', date: '2026-03-27', impact: 'Medium', ticker: 'XLY', rec: 'WATCH', reason: 'Weak sentiment could confirm consumer slowdown narrative and weigh on discretionary stocks.' },
  { id: 14, headline: 'FedEx earnings this week — logistics bellwether', industry: 'Finance', date: '2026-03-25', impact: 'Medium', ticker: 'FDX', rec: 'HOLD', reason: 'Trade volume data will signal economic momentum; hold pending results.' },
];

function App() {
  const [selected, setSelected] = useState(null);

  const today = new Date('2026-03-24');
  const dayMs = 86400000;
  const minDate = new Date(today.getTime() - 5 * dayMs);
  const maxDate = new Date(today.getTime() + 5 * dayMs);
  const impactVal = { High: 3, Medium: 2, Low: 1 };

  const chartW = 900, chartH = 320, padL = 60, padR = 30, padT = 30, padB = 50;
  const plotW = chartW - padL - padR, plotH = chartH - padT - padB;

  function xPos(dateStr) {
    const d = new Date(dateStr);
    return padL + ((d - minDate) / (maxDate - minDate)) * plotW;
  }
  function yPos(impact) {
    return padT + plotH - ((impactVal[impact] - 0.5) / 3) * plotH;
  }
  const todayX = xPos('2026-03-24');

  const days = [];
  for (let i = -5; i <= 5; i++) {
    const d = new Date(today.getTime() + i * dayMs);
    days.push(d.toISOString().slice(0, 10));
  }

  return (
    <div>
      <h1 style={{ fontSize: 28, fontWeight: 700, marginBottom: 4, color: '#f1f5f9' }}>Daily Market Analysis</h1>
      <p style={{ color: '#94a3b8', marginBottom: 24 }}>March 24, 2026 — US Markets</p>

      <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 24, overflowX: 'auto' }}>
        <svg width={chartW} height={chartH} style={{ display: 'block', margin: '0 auto' }}>
          {/* Past bg */}
          <rect x={padL} y={padT} width={todayX - padL} height={plotH} fill="rgba(239,68,68,0.06)" />
          {/* Future bg */}
          <rect x={todayX} y={padT} width={padL + plotW - todayX} height={plotH} fill="rgba(34,197,94,0.06)" />
          {/* Grid lines */}
          {[1, 2, 3].map(v => (
            <g key={v}>
              <line x1={padL} y1={yPos(Object.keys(impactVal).find(k => impactVal[k] === v))} x2={padL + plotW} y2={yPos(Object.keys(impactVal).find(k => impactVal[k] === v))} stroke="#1e293b" />
              <text x={padL - 8} y={yPos(Object.keys(impactVal).find(k => impactVal[k] === v)) + 4} fill="#64748b" fontSize={12} textAnchor="end">{['', 'Low', 'Med', 'High'][v]}</text>
            </g>
          ))}
          {/* X axis labels */}
          {days.map(d => (
            <text key={d} x={xPos(d)} y={chartH - 8} fill="#64748b" fontSize={10} textAnchor="middle">{d.slice(5)}</text>
          ))}
          {/* Today line */}
          <line x1={todayX} y1={padT} x2={todayX} y2={padT + plotH} stroke="#ef4444" strokeWidth={2} strokeDasharray="6,4" />
          <text x={todayX} y={padT - 8} fill="#ef4444" fontSize={11} textAnchor="middle">TODAY</text>
          {/* Event dots */}
          {EVENTS.map(ev => {
            const cx = xPos(ev.date), cy = yPos(ev.impact);
            const isSel = selected && selected.id === ev.id;
            return (
              <g key={ev.id} onClick={() => setSelected(isSel ? null : ev)} style={{ cursor: 'pointer' }}>
                <circle cx={cx} cy={cy} r={isSel ? 10 : 7} fill={COLORS[ev.industry]} opacity={isSel ? 1 : 0.85} stroke={isSel ? '#fff' : 'none'} strokeWidth={2} />
                <text x={cx} y={cy - 12} fill={COLORS[ev.industry]} fontSize={9} textAnchor="middle" fontWeight={600}>{ev.ticker}</text>
              </g>
            );
          })}
        </svg>

        {/* Legend */}
        <div style={{ display: 'flex', gap: 20, justifyContent: 'center', marginTop: 12 }}>
          {Object.entries(COLORS).map(([k, c]) => (
            <div key={k} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 10, height: 10, borderRadius: '50%', background: c }} />
              <span style={{ fontSize: 12, color: '#94a3b8' }}>{k}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Detail Panel */}
      {selected && (
        <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, marginBottom: 24, borderLeft: `4px solid ${COLORS[selected.industry]}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: 12 }}>
            <div>
              <h3 style={{ fontSize: 18, color: '#f1f5f9', marginBottom: 6 }}>{selected.headline}</h3>
              <p style={{ color: '#94a3b8', fontSize: 13 }}>{selected.date} · {selected.industry} · <strong style={{ color: COLORS[selected.industry] }}>{selected.ticker}</strong> · Impact: {selected.impact}</p>
            </div>
            <span style={{ background: REC_COLORS[selected.rec], color: selected.rec === 'HOLD' ? '#000' : '#fff', padding: '4px 14px', borderRadius: 20, fontWeight: 700, fontSize: 14, whiteSpace: 'nowrap' }}>{selected.rec}</span>
          </div>
          <p style={{ marginTop: 12, color: '#cbd5e1', lineHeight: 1.6 }}>{selected.reason}</p>
        </div>
      )}

      {/* Table */}
      <div style={{ background: '#151c2c', borderRadius: 12, padding: 20, overflowX: 'auto' }}>
        <h2 style={{ fontSize: 18, marginBottom: 12, color: '#f1f5f9' }}>All Events</h2>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ borderBottom: '1px solid #1e293b' }}>
              {['Date', 'Ticker', 'Industry', 'Impact', 'Rec', 'Headline'].map(h => (
                <th key={h} style={{ textAlign: 'left', padding: '8px 10px', color: '#64748b', fontWeight: 600 }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {EVENTS.sort((a, b) => a.date.localeCompare(b.date)).map(ev => (
              <tr key={ev.id} onClick={() => setSelected(ev)} style={{ borderBottom: '1px solid #1e293b', cursor: 'pointer' }}
                onMouseEnter={e => e.currentTarget.style.background = '#1e293b'} onMouseLeave={e => e.currentTarget.style.background = 'none'}>
                <td style={{ padding: '8px 10px', whiteSpace: 'nowrap' }}>{ev.date.slice(5)}</td>
                <td style={{ padding: '8px 10px', color: COLORS[ev.industry], fontWeight: 700 }}>{ev.ticker}</td>
                <td style={{ padding: '8px 10px' }}>{ev.industry}</td>
                <td style={{ padding: '8px 10px' }}>{ev.impact}</td>
                <td style={{ padding: '8px 10px' }}>
                  <span style={{ background: REC_COLORS[ev.rec], color: ev.rec === 'HOLD' ? '#000' : '#fff', padding: '2px 10px', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>{ev.rec}</span>
                </td>
                <td style={{ padding: '8px 10px', maxWidth: 400 }}>{ev.headline}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <p style={{ textAlign: 'center', color: '#475569', fontSize: 11, marginTop: 24 }}>Generated 2026-03-24 · Data from CNBC, Bloomberg, Earnings Whispers, Econoday</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(React.createElement(App));
</script>
</body>
</html>

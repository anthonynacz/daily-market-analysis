<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Market Analysis - June 3, 2026</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>

    #app { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const EVENTS = [
      { id: 1, headline: "Marvell surges 25% after Huang calls it 'next trillion-dollar company'", ticker: "MRVL", industry: "Tech", date: "2026-06-02", impact: "High", recommendation: "BUY", reason: "Strong AI data center tailwinds and NVDA ecosystem endorsement signal sustained growth." },
      { id: 2, headline: "Microchip Technology pops 12% on data center revenue surge", ticker: "MCHP", industry: "Tech", date: "2026-06-02", impact: "High", recommendation: "BUY", reason: "Data center revenue hit $302.7M with 65% YoY growth projected for 2026." },
      { id: 3, headline: "Alphabet drops 4% on $80B equity raise for AI buildout", ticker: "GOOGL", industry: "Tech", date: "2026-06-02", impact: "High", recommendation: "HOLD", reason: "Dilution pressure is real, but $10B Berkshire investment signals long-term confidence." },
      { id: 4, headline: "NVIDIA Computex keynote highlights massive AI data center buildout", ticker: "NVDA", industry: "Tech", date: "2026-06-02", impact: "High", recommendation: "BUY", reason: "Continued dominance in AI infrastructure with expanding partner ecosystem." },
      { id: 5, headline: "Broadcom Q2 earnings report after market close", ticker: "AVGO", industry: "Tech", date: "2026-06-03", impact: "High", recommendation: "WATCH", reason: "Key bellwether for AI chip demand; results will set tone for semiconductor sector." },
      { id: 6, headline: "CrowdStrike Q1 earnings report after market close", ticker: "CRWD", industry: "Tech", date: "2026-06-03", impact: "High", recommendation: "WATCH", reason: "Cybersecurity spending trends and ARR growth will gauge enterprise IT budgets." },
      { id: 7, headline: "Hewlett Packard Enterprise AI server demand boosts midday rally", ticker: "HPE", industry: "Tech", date: "2026-06-02", impact: "Medium", recommendation: "HOLD", reason: "AI server tailwinds are positive, but margins remain under pressure from competition." },
      { id: 8, headline: "Berkshire Hathaway invests $10B in Alphabet's AI future", ticker: "BRK.B", industry: "Finance", date: "2026-06-02", impact: "High", recommendation: "BUY", reason: "Buffett's AI bet signals value opportunity and validates Alphabet's long-term AI strategy." },
      { id: 9, headline: "S&P 500 closes above 7,600 for the first time", ticker: "SPX", industry: "Finance", date: "2026-06-02", impact: "High", recommendation: "WATCH", reason: "Record highs driven by chip sector; breadth and sustainability need monitoring." },
      { id: 10, headline: "Five Below Q1 earnings report after market close", ticker: "FIVE", industry: "Finance", date: "2026-06-03", impact: "Medium", recommendation: "WATCH", reason: "Consumer discretionary bellwether; same-store sales will reveal spending trends." },
      { id: 11, headline: "WTI crude surges to $93.76/barrel on geopolitical tensions", ticker: "WTI", industry: "Energy", date: "2026-06-02", impact: "Medium", recommendation: "HOLD", reason: "Elevated prices support energy stocks but risk demand destruction at these levels." },
      { id: 12, headline: "Brent crude approaches $96 as energy sector rallies", ticker: "BRT", industry: "Energy", date: "2026-06-02", impact: "Medium", recommendation: "WATCH", reason: "Supply constraints and geopolitical risk keep upward pressure on crude benchmarks." },
      { id: 13, headline: "Dr. Reddy's Laboratories files quarterly 6-K report", ticker: "RDY", industry: "Healthcare", date: "2026-06-03", impact: "Medium", recommendation: "WATCH", reason: "Generic drug pipeline and US market penetration key metrics to track." },
      { id: 14, headline: "Non-Farm Payrolls report expected to show labor market cooling", ticker: "NFP", industry: "Finance", date: "2026-06-05", impact: "High", recommendation: "WATCH", reason: "Jobs data will heavily influence Fed rate path and June FOMC expectations." },
    ];

    const INDUSTRY_COLORS = { Tech: "#818cf8", Healthcare: "#34d399", Energy: "#fbbf24", Finance: "#fb7185" };
    const REC_COLORS = { BUY: "#22c55e", SELL: "#ef4444", HOLD: "#eab308", WATCH: "#3b82f6" };
    const TODAY = "2026-06-03";
    const DATES = ["2026-05-31","2026-06-01","2026-06-02","2026-06-03","2026-06-04","2026-06-05","2026-06-06","2026-06-07","2026-06-08"];
    const DATE_LABELS = ["May 31","Jun 1","Jun 2","Jun 3","Jun 4","Jun 5","Jun 6","Jun 7","Jun 8"];
    const IMPACT_MAP = { Low: 0, Medium: 1, High: 2 };
    const IMPACT_LABELS = ["Low", "Medium", "High"];

    function App() {
      const [selected, setSelected] = useState(null);

      const chartW = 820;
      const chartH = 400;
      const pad = { top: 40, right: 40, bottom: 60, left: 70 };
      const plotW = chartW - pad.left - pad.right;
      const plotH = chartH - pad.top - pad.bottom;

      const positions = useMemo(() => {
        const counts = {};
        return EVENTS.map((ev) => {
          const di = DATES.indexOf(ev.date);
          const ii = IMPACT_MAP[ev.impact];
          const key = di + "-" + ii;
          counts[key] = (counts[key] || 0) + 1;
          const count = counts[key];
          const offsetX = ((count - 1) % 4) * 18 - 27;
          const offsetY = Math.floor((count - 1) / 4) * 18 - 9;
          const x = pad.left + (di / (DATES.length - 1)) * plotW + offsetX;
          const y = pad.top + plotH - (ii / 2) * plotH + offsetY;
          return Object.assign({}, ev, { cx: x, cy: y });
        });
      }, []);

      const todayIdx = DATES.indexOf(TODAY);
      const todayX = pad.left + (todayIdx / (DATES.length - 1)) * plotW;

      return React.createElement("div", { style: { minHeight: "100vh", background: "#0b0f1a", color: "#e2e8f0", fontFamily: "'Inter','Segoe UI',system-ui,sans-serif", padding: "24px" } },
        React.createElement("h1", { style: { fontSize: "28px", fontWeight: 700, marginBottom: "4px" } }, "Daily Market Analysis"),
        React.createElement("p", { style: { color: "#94a3b8", marginBottom: "24px", fontSize: "14px" } }, "June 3, 2026 · S&P 500 at 7,609 · 14 events tracked"),

        React.createElement("div", { style: { display: "flex", gap: "12px", marginBottom: "20px", flexWrap: "wrap" } },
          Object.entries(INDUSTRY_COLORS).map(function([ind, color]) {
            return React.createElement("span", { key: ind, style: { display: "flex", alignItems: "center", gap: "6px", fontSize: "13px" } },
              React.createElement("span", { style: { width: 12, height: 12, borderRadius: "50%", background: color, display: "inline-block" } }),
              ind
            );
          })
        ),

        React.createElement("div", { style: { background: "#151c2c", borderRadius: "12px", padding: "20px", marginBottom: "20px", overflowX: "auto" } },
          React.createElement("svg", { width: chartW, height: chartH, style: { display: "block", margin: "0 auto" } },
            React.createElement("rect", { x: pad.left, y: pad.top, width: todayX - pad.left, height: plotH, fill: "rgba(239,68,68,0.06)" }),
            React.createElement("rect", { x: todayX, y: pad.top, width: pad.left + plotW - todayX, height: plotH, fill: "rgba(34,197,94,0.06)" }),

            DATES.map(function(_, i) {
              var x = pad.left + (i / (DATES.length - 1)) * plotW;
              return React.createElement("g", { key: i },
                React.createElement("line", { x1: x, y1: pad.top, x2: x, y2: pad.top + plotH, stroke: "#1e293b", strokeWidth: "1" }),
                React.createElement("text", { x: x, y: chartH - 15, textAnchor: "middle", fill: "#64748b", fontSize: "12" }, DATE_LABELS[i])
              );
            }),

            IMPACT_LABELS.map(function(label, i) {
              var y = pad.top + plotH - (i / 2) * plotH;
              return React.createElement("g", { key: label },
                React.createElement("line", { x1: pad.left, y1: y, x2: pad.left + plotW, y2: y, stroke: "#1e293b", strokeWidth: "1" }),
                React.createElement("text", { x: pad.left - 12, y: y + 4, textAnchor: "end", fill: "#64748b", fontSize: "12" }, label)
              );
            }),

            React.createElement("line", { x1: todayX, y1: pad.top - 10, x2: todayX, y2: pad.top + plotH + 10, stroke: "#ef4444", strokeWidth: "2", strokeDasharray: "6,4" }),
            React.createElement("text", { x: todayX, y: pad.top - 15, textAnchor: "middle", fill: "#ef4444", fontSize: "11", fontWeight: "600" }, "TODAY"),

            positions.map(function(ev) {
              return React.createElement("g", { key: ev.id, style: { cursor: "pointer" }, onClick: function() { setSelected(selected && selected.id === ev.id ? null : ev); } },
                React.createElement("circle", { cx: ev.cx, cy: ev.cy, r: selected && selected.id === ev.id ? 10 : 8, fill: INDUSTRY_COLORS[ev.industry], opacity: 0.9, stroke: selected && selected.id === ev.id ? "#fff" : "none", strokeWidth: "2" }),
                React.createElement("text", { x: ev.cx, y: ev.cy + 4, textAnchor: "middle", fill: "#0b0f1a", fontSize: "9", fontWeight: "700", style: { pointerEvents: "none" } }, ev.ticker.slice(0, 3))
              );
            })
          )
        ),

        selected && React.createElement("div", { style: { background: "#151c2c", borderRadius: "12px", padding: "20px", marginBottom: "20px", border: "1px solid " + INDUSTRY_COLORS[selected.industry] + "44" } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "12px" } },
            React.createElement("div", null,
              React.createElement("h3", { style: { fontSize: "18px", fontWeight: 600, marginBottom: "6px" } }, selected.headline),
              React.createElement("p", { style: { color: "#94a3b8", fontSize: "13px" } }, selected.ticker + " · " + selected.industry + " · " + selected.date + " · Impact: " + selected.impact)
            ),
            React.createElement("span", { style: { padding: "4px 14px", borderRadius: "9999px", fontSize: "13px", fontWeight: 600, background: REC_COLORS[selected.recommendation] + "22", color: REC_COLORS[selected.recommendation], border: "1px solid " + REC_COLORS[selected.recommendation] + "55" } }, selected.recommendation)
          ),
          React.createElement("p", { style: { marginTop: "12px", color: "#cbd5e1", fontSize: "14px", lineHeight: "1.6" } }, selected.reason)
        ),

        React.createElement("div", { style: { background: "#151c2c", borderRadius: "12px", padding: "20px", overflowX: "auto" } },
          React.createElement("h2", { style: { fontSize: "18px", fontWeight: 600, marginBottom: "16px" } }, "All Events"),
          React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: "13px" } },
            React.createElement("thead", null,
              React.createElement("tr", { style: { borderBottom: "1px solid #1e293b" } },
                ["Date","Ticker","Headline","Industry","Impact","Rec"].map(function(h) {
                  return React.createElement("th", { key: h, style: { textAlign: "left", padding: "10px 8px", color: "#64748b", fontWeight: 500 } }, h);
                })
              )
            ),
            React.createElement("tbody", null,
              EVENTS.map(function(ev) {
                return React.createElement("tr", {
                  key: ev.id,
                  onClick: function() { setSelected(ev); },
                  style: { borderBottom: "1px solid rgba(30,41,59,0.3)", cursor: "pointer" },
                  onMouseOver: function(e) { e.currentTarget.style.background = "#1e293b"; },
                  onMouseOut: function(e) { e.currentTarget.style.background = "transparent"; }
                },
                  React.createElement("td", { style: { padding: "10px 8px", whiteSpace: "nowrap" } }, ev.date),
                  React.createElement("td", { style: { padding: "10px 8px", fontWeight: 600, color: INDUSTRY_COLORS[ev.industry] } }, ev.ticker),
                  React.createElement("td", { style: { padding: "10px 8px", maxWidth: "360px" } }, ev.headline),
                  React.createElement("td", { style: { padding: "10px 8px" } },
                    React.createElement("span", { style: { display: "flex", alignItems: "center", gap: "6px" } },
                      React.createElement("span", { style: { width: 8, height: 8, borderRadius: "50%", background: INDUSTRY_COLORS[ev.industry], display: "inline-block" } }),
                      ev.industry
                    )
                  ),
                  React.createElement("td", { style: { padding: "10px 8px" } }, ev.impact),
                  React.createElement("td", { style: { padding: "10px 8px" } },
                    React.createElement("span", { style: { padding: "2px 10px", borderRadius: "9999px", fontSize: "12px", fontWeight: 600, background: REC_COLORS[ev.recommendation] + "22", color: REC_COLORS[ev.recommendation] } }, ev.recommendation)
                  )
                );
              })
            )
          )
        ),

        React.createElement("p", { style: { textAlign: "center", color: "#475569", fontSize: "12px", marginTop: "24px" } }, "Generated by Daily Market Analysis · Not financial advice")
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
  </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>US Market Pulse — Recency × Impact Matrix</title>
<style>
  html, body { margin: 0; background: #0b0f1a; }
  body { padding: 16px; -webkit-text-size-adjust: 100%; }
  #root { max-width: 1000px; margin: 0 auto; }
  .boot { color:#64748b; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; text-align:center; padding:40px 16px; font-size:14px; }
  .err  { color:#f87171; font-family:ui-monospace,monospace; white-space:pre-wrap; padding:16px; font-size:12px; }
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"><div class="boot">Loading market matrix…</div></div>
<script id="jsx-source" type="text/plain">
const { useState, useMemo } = React;

const EVENTS = [
  { id: 1, headline: "Dow Jones hits all-time record 50,285", industry: "Finance", date: "2026-05-22", impact: "High", ticker: "DIA", recommendation: "HOLD", reason: "Record highs show strong momentum but elevated valuations warrant caution" },
  { id: 2, headline: "US-Iran peace deal draft reported 'near'", industry: "Energy", date: "2026-05-23", impact: "High", ticker: "XOM", recommendation: "WATCH", reason: "Resolution could significantly reduce oil supply premiums" },
  { id: 3, headline: "WTI crude drops to $96.35 on Iran progress", industry: "Energy", date: "2026-05-22", impact: "High", ticker: "CVX", recommendation: "SELL", reason: "Peace deal progress pressuring crude prices further downside likely" },
  { id: 4, headline: "Kevin Warsh sworn in as new Fed Chair", industry: "Finance", date: "2026-05-23", impact: "High", ticker: "JPM", recommendation: "BUY", reason: "Warsh expected to be market-friendly and support continued growth" },
  { id: 5, headline: "FOMC holds rates at 3.50-3.75% (final Powell act)", industry: "Finance", date: "2026-05-20", impact: "High", ticker: "GS", recommendation: "HOLD", reason: "Rate pause signals stability, await Warsh policy direction" },
  { id: 6, headline: "S&P 500 advances to 7,445 new high", industry: "Finance", date: "2026-05-22", impact: "Medium", ticker: "SPY", recommendation: "HOLD", reason: "Broad market gains but caution warranted at all-time highs" },
  { id: 7, headline: "Russell 2000 small-cap rally accelerates", industry: "Finance", date: "2026-05-22", impact: "Medium", ticker: "IWM", recommendation: "BUY", reason: "Small caps outperforming signals healthy broadening of the rally" },
  { id: 8, headline: "Brent crude falls below $103 on geopolitical shift", industry: "Energy", date: "2026-05-22", impact: "High", ticker: "USO", recommendation: "SELL", reason: "Iran deal progress threatening sustained oil supply premiums" },
  { id: 9, headline: "Comstock Resources Q1 2026 earnings due", industry: "Energy", date: "2026-05-26", impact: "Medium", ticker: "CRK", recommendation: "WATCH", reason: "Natural gas producer facing volatile energy market conditions" },
  { id: 10, headline: "DR Reddy's Laboratories reports earnings", industry: "Healthcare", date: "2026-05-26", impact: "Medium", ticker: "RDY", recommendation: "BUY", reason: "Generic pharma benefiting from healthcare cost-cutting trends" },
  { id: 11, headline: "American Well Corp (Amwell) earnings release", industry: "Healthcare", date: "2026-05-26", impact: "Medium", ticker: "AMWL", recommendation: "HOLD", reason: "Telehealth growth stabilizing after post-pandemic normalization" },
  { id: 12, headline: "NVIDIA earnings week anticipation builds", industry: "Tech", date: "2026-05-28", impact: "High", ticker: "NVDA", recommendation: "BUY", reason: "AI infrastructure spending continues to accelerate across enterprises" },
  { id: 13, headline: "Apple WWDC pre-event positioning begins", industry: "Tech", date: "2026-05-27", impact: "Medium", ticker: "AAPL", recommendation: "WATCH", reason: "Traders positioning ahead of June developer conference announcements" },
  { id: 14, headline: "Memorial Day market closure Monday", industry: "Finance", date: "2026-05-25", impact: "Low", ticker: "SPY", recommendation: "HOLD", reason: "Reduced liquidity around holiday may increase volatility Tuesday" },
];

const INDUSTRY_COLORS = {
  Tech: '#818cf8',
  Healthcare: '#34d399',
  Energy: '#fbbf24',
  Finance: '#fb7185',
};

const IMPACT_Y = { High: 3, Medium: 2, Low: 1 };

const REC_COLORS = {
  BUY: '#22c55e',
  SELL: '#ef4444',
  HOLD: '#eab308',
  WATCH: '#3b82f6',
};

function DailyMarketAnalysis() {
  const [selected, setSelected] = useState(null);

  const today = new Date('2026-05-24');
  const startDate = new Date('2026-05-21');
  const endDate = new Date('2026-05-29');
  const totalDays = (endDate - startDate) / (1000 * 60 * 60 * 24);

  const chartWidth = 900;
  const chartHeight = 300;
  const padding = { top: 40, right: 40, bottom: 60, left: 60 };

  const getX = (dateStr) => {
    const d = new Date(dateStr);
    const dayOffset = (d - startDate) / (1000 * 60 * 60 * 24);
    return padding.left + (dayOffset / totalDays) * (chartWidth - padding.left - padding.right);
  };

  const getY = (impact) => {
    const level = IMPACT_Y[impact];
    return chartHeight - padding.bottom - ((level - 0.5) / 3.5) * (chartHeight - padding.top - padding.bottom);
  };

  const todayX = getX('2026-05-24');

  const dateLabels = useMemo(() => {
    const labels = [];
    const d = new Date(startDate);
    while (d <= endDate) {
      labels.push(new Date(d));
      d.setDate(d.getDate() + 1);
    }
    return labels;
  }, []);

  return (
    <div style={{ background: '#0b0f1a', minHeight: '100vh', color: '#e2e8f0', fontFamily: 'Inter, system-ui, sans-serif', padding: '2rem' }}>
      <h1 style={{ fontSize: '1.75rem', fontWeight: 700, marginBottom: '0.25rem' }}>Daily Market Analysis</h1>
      <p style={{ color: '#94a3b8', marginBottom: '2rem' }}>May 24, 2026 — 14 Key Events Across 4 Industries</p>

      <div style={{ background: '#151c2c', borderRadius: '12px', padding: '1.5rem', marginBottom: '2rem' }}>
        <svg width={chartWidth} height={chartHeight} style={{ width: '100%', height: 'auto' }} viewBox={`0 0 ${chartWidth} ${chartHeight}`}>
          {/* Past background (faint red) */}
          <rect x={padding.left} y={padding.top} width={todayX - padding.left} height={chartHeight - padding.top - padding.bottom} fill="rgba(239,68,68,0.05)" />
          {/* Future background (faint green) */}
          <rect x={todayX} y={padding.top} width={chartWidth - padding.right - todayX} height={chartHeight - padding.top - padding.bottom} fill="rgba(34,197,94,0.05)" />

          {/* Today line */}
          <line x1={todayX} y1={padding.top} x2={todayX} y2={chartHeight - padding.bottom} stroke="#ef4444" strokeWidth="2" strokeDasharray="6 4" />
          <text x={todayX} y={padding.top - 10} fill="#ef4444" fontSize="11" textAnchor="middle">TODAY</text>

          {/* Y-axis labels */}
          {['Low', 'Medium', 'High'].map((label, i) => (
            <text key={label} x={padding.left - 10} y={getY(label) + 4} fill="#64748b" fontSize="11" textAnchor="end">{label}</text>
          ))}

          {/* X-axis date labels */}
          {dateLabels.map((d) => {
            const dateStr = d.toISOString().split('T')[0];
            const x = getX(dateStr);
            const label = `${d.getMonth() + 1}/${d.getDate()}`;
            return (
              <text key={dateStr} x={x} y={chartHeight - padding.bottom + 20} fill="#64748b" fontSize="10" textAnchor="middle">{label}</text>
            );
          })}

          {/* Grid lines */}
          {['Low', 'Medium', 'High'].map((label) => (
            <line key={label} x1={padding.left} y1={getY(label)} x2={chartWidth - padding.right} y2={getY(label)} stroke="#1e293b" strokeWidth="1" />
          ))}

          {/* Event dots */}
          {EVENTS.map((event) => {
            const cx = getX(event.date);
            const cy = getY(event.impact);
            const color = INDUSTRY_COLORS[event.industry];
            const isSelected = selected?.id === event.id;
            return (
              <circle
                key={event.id}
                cx={cx}
                cy={cy}
                r={isSelected ? 10 : 7}
                fill={color}
                opacity={isSelected ? 1 : 0.85}
                stroke={isSelected ? '#fff' : 'none'}
                strokeWidth={2}
                style={{ cursor: 'pointer', transition: 'all 0.2s' }}
                onClick={() => setSelected(event)}
              />
            );
          })}
        </svg>

        {/* Legend */}
        <div style={{ display: 'flex', gap: '1.5rem', marginTop: '1rem', flexWrap: 'wrap' }}>
          {Object.entries(INDUSTRY_COLORS).map(([industry, color]) => (
            <div key={industry} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
              <div style={{ width: 12, height: 12, borderRadius: '50%', background: color }} />
              <span style={{ fontSize: '0.8rem', color: '#94a3b8' }}>{industry}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Detail Panel */}
      {selected && (
        <div style={{ background: '#151c2c', borderRadius: '12px', padding: '1.5rem', marginBottom: '2rem', borderLeft: `4px solid ${INDUSTRY_COLORS[selected.industry]}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '1rem' }}>
            <div>
              <h3 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '0.5rem' }}>{selected.headline}</h3>
              <p style={{ color: '#94a3b8', fontSize: '0.85rem' }}>
                {selected.industry} &bull; {selected.date} &bull; Impact: {selected.impact} &bull; Ticker: <strong>{selected.ticker}</strong>
              </p>
              <p style={{ color: '#cbd5e1', marginTop: '0.5rem', fontSize: '0.9rem' }}>{selected.reason}</p>
            </div>
            <span style={{
              padding: '0.35rem 1rem',
              borderRadius: '999px',
              fontSize: '0.8rem',
              fontWeight: 700,
              background: REC_COLORS[selected.recommendation] + '22',
              color: REC_COLORS[selected.recommendation],
              border: `1px solid ${REC_COLORS[selected.recommendation]}44`,
              whiteSpace: 'nowrap'
            }}>
              {selected.recommendation}
            </span>
          </div>
          <button onClick={() => setSelected(null)} style={{ marginTop: '1rem', background: 'none', border: '1px solid #334155', color: '#94a3b8', padding: '0.3rem 0.8rem', borderRadius: '6px', cursor: 'pointer', fontSize: '0.8rem' }}>Close</button>
        </div>
      )}

      {/* Events Table */}
      <div style={{ background: '#151c2c', borderRadius: '12px', padding: '1.5rem', overflowX: 'auto' }}>
        <h2 style={{ fontSize: '1.1rem', fontWeight: 600, marginBottom: '1rem' }}>All Events</h2>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '0.85rem' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid #1e293b' }}>
              <th style={{ textAlign: 'left', padding: '0.6rem', color: '#64748b' }}>Date</th>
              <th style={{ textAlign: 'left', padding: '0.6rem', color: '#64748b' }}>Headline</th>
              <th style={{ textAlign: 'left', padding: '0.6rem', color: '#64748b' }}>Industry</th>
              <th style={{ textAlign: 'left', padding: '0.6rem', color: '#64748b' }}>Ticker</th>
              <th style={{ textAlign: 'left', padding: '0.6rem', color: '#64748b' }}>Impact</th>
              <th style={{ textAlign: 'left', padding: '0.6rem', color: '#64748b' }}>Rec</th>
            </tr>
          </thead>
          <tbody>
            {EVENTS.map((event) => (
              <tr key={event.id} style={{ borderBottom: '1px solid #1e293b', cursor: 'pointer' }} onClick={() => setSelected(event)}>
                <td style={{ padding: '0.6rem', color: '#94a3b8' }}>{event.date}</td>
                <td style={{ padding: '0.6rem' }}>{event.headline}</td>
                <td style={{ padding: '0.6rem' }}>
                  <span style={{ color: INDUSTRY_COLORS[event.industry] }}>{event.industry}</span>
                </td>
                <td style={{ padding: '0.6rem', fontWeight: 600 }}>{event.ticker}</td>
                <td style={{ padding: '0.6rem', color: '#94a3b8' }}>{event.impact}</td>
                <td style={{ padding: '0.6rem' }}>
                  <span style={{
                    padding: '0.2rem 0.6rem',
                    borderRadius: '999px',
                    fontSize: '0.75rem',
                    fontWeight: 700,
                    background: REC_COLORS[event.recommendation] + '22',
                    color: REC_COLORS[event.recommendation],
                  }}>
                    {event.recommendation}
                  </span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<DailyMarketAnalysis />);
</script>
<script>
  (function () {
    try {
      var src = document.getElementById("jsx-source").textContent;
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      var s = document.createElement("script");
      s.text = out;
      document.body.appendChild(s);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div class="err">Render error: ' + (e && e.message ? e.message : e) + '</div>';
      console.error(e);
    }
  })();
</script>
</body>
</html>
